Privacy=حریم خصوصی
Introduction=مقدمه
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=از اینکه استفاده از ImMobile را انتخاب کردید متشکریم.حریم خصوصی شما برای من مهم است، و من متعهد هستم که اطمینان حاصل کنم که تجربه شما با برنامه من ایمن و خصوصی باقی می ماند.
Information Collection=مجموعه اطلاعات
This application is designed with your privacy in mind.=این برنامه با در نظر گرفتن حریم خصوصی شما طراحی شده است.
I do not collect or gather any personal information from you.=من هیچ اطلاعات شخصی را از شما جمع آوری یا جمع آوری نمی کنم.
No data will be stored by the app.=هیچ داده ای توسط برنامه ذخیره نخواهد شد.
No user tracking or analytics are performed.=هیچ ردیابی یا تجزیه و تحلیل کاربر انجام نمی شود.
Responsibility for Security=مسئولیت امنیت
Third-Party Scripts and Extensions:=اسکریپت ها و برنامه های افزودنی شخص ثالث:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile API پیشرفته را با اسکریپت ها یا برنامه های افزودنی شخص ثالث ارائه می دهد.لطفاً هنگام نصب یا استفاده از آنها احتیاط کنید، به خصوص اگر از منابع نامعتبر منشا می گیرند.
User's Role in Security:=نقش کاربر در امنیت:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=به عنوان یک کاربر، شما مسئول حفظ ایمنی و امنیت دستگاه خود هستید و اطمینان حاصل می کنید که فقط با محتوا و خدمات قابل اعتماد تعامل دارید.
Potential Risks:=خطرات بالقوه:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=نصب یا استفاده از اسکریپت ها و برنامه های افزودنی از منابع نامعتبر می تواند منجر به آسیب احتمالی یا از دست رفتن داده ها شود.کاربران باید قبل از اقدام، هوشیار بوده و قابل اعتماد بودن چنین منابعی را ارزیابی کنند.
Disclaimer=سلب مسئولیت
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=در حالی که من در تلاش برای ارائه یک محیط امن هستم، نمی توانم مسئولیتی در قبال مسائلی که ناشی از تداخل شخص ثالث یا مدیریت نامناسب دستگاه شما باشد، بر عهده بگیرم.مسئولیت تضمین امنیت شما بر عهده شما، کاربر است.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=با استفاده از ImMobile، این خط مشی رازداری را تایید و با آن موافقت می کنید.اگر سؤال یا نگرانی دارید، برای کمک بیشتر با ما تماس بگیرید.
This privacy policy is subject to change. Please review it periodically for updates.=این سیاست حفظ حریم خصوصی ممکن است تغییر کند.لطفاً آن را به صورت دوره ای برای به روز رسانی مرور کنید.
