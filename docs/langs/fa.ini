If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=اگر ImMobile فعال باشد دیگر کاهش FPS را در برخی از ویندوزها در نظر نمی گیرد، ممکن است منجر به بار اضافی با محتوای سنگین شود.
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=بار کمتر CPU و گرمای کمتر، ممکن است حلقه های دیگر را تحت تأثیر قرار دهد، مانند اگر شبیه سازی صوتی یا چیزی شبیه به آن دارید.
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=نمایش اعلان هنگام کاهش FPS، غیرفعال کردن این فقط اعلان را غیرفعال می کند نه نمایشگر FPS
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=این گزینه می‌تواند با پرش از فریم‌های تکراری، استفاده از GPU را بسیار کاهش دهد و در صورت بروز مشکلات آن را خاموش کند.
Choose folder=پوشه را انتخاب کنید
Choose=انتخاب کنید
