It can boost loading time, but some new files may not appear until it get indexed by Windows=این می تواند زمان بارگذاری را افزایش دهد، اما برخی از فایل های جدید ممکن است تا زمانی که توسط ویندوز ایندکس نشوند ظاهر نشوند
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=اگر فایل/پوشه هدف از قبل وجود داشته باشد جایگزین خواهد شد، مراقب باشید خاموش کردن آن ممکن است منجر به مشکلات زیادی شود.
On locked systems, it may take more time load folders details, disable it for faster loading=در سیستم‌های قفل‌شده، ممکن است بارگذاری جزئیات پوشه‌ها به زمان بیشتری نیاز داشته باشد، آن را برای بارگیری سریع‌تر غیرفعال کنید
On locked systems, it may take more time load file details, disable it for faster loading=در سیستم‌های قفل‌شده، ممکن است بارگذاری جزئیات فایل زمان بیشتری طول بکشد، آن را برای بارگیری سریع‌تر غیرفعال کنید
When you have corrupted settings this option can fix that=وقتی تنظیمات خرابی دارید، این گزینه می تواند آن را برطرف کند
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=درخواست تاخیر در ذخیره سازی IO، در سیستم قفل شده تاخیر مهم است اما کندتر است، اگر دسترسی ریشه دارید این گزینه را غیرفعال کنید
Don't enable this if you have build lower than 14393, it will lead to issues=اگر بیلد کمتر از 14393 دارید، این را فعال نکنید، به مشکلاتی منجر می شود
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=این کار بسته‌ها را در SDCard حل و فصل می‌کند و در صورت وجود، آن را بر روی SDCard نصب نمی‌کند، اگر می‌خواهید بازی‌های بزرگ نصب کنید می‌تواند مفید باشد.
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=به طور پیش فرض اندازه پوشه calc فقط فایل های ریشه را محاسبه می کند نه پوشه فرعی، اما فعال کردن آن می تواند منجر به بارگذاری بی پایان به طور خاص برای درایو ریشه شود.
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=با این کار سعی می شود تصاویر را با تصویر کوچک بهینه سازی شده پیش نمایش و بارگذاری کند، در غیر این صورت به فایل خام بازگردانده می شود.
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=با این کار سعی می شود از رمزگشای بیت مپ ویندوز برای بارگیری تصویر استفاده شود، در صورت عدم موفقیت، به کمک کننده های stb که ممکن است کمی کندتر باشد، برگشت داده می شود.
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=این کار برای بافت بارگذاری شده Mips ایجاد می کند، برای کیفیت بهتر مفید است، اما حافظه GPU بیشتری استفاده خواهد شد.
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=هر تصویر بزرگتر از حداکثر اندازه مجاز فشرده می شود، این می تواند به تأخیر زیادی منجر شود، اما تصویر فشرده ذخیره می شود
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=هر نماد بزرگتر از حداکثر اندازه مجاز فشرده می شود، این می تواند به تأخیر زیادی منجر شود، اما نماد فشرده در حافظه پنهان ذخیره می شود.
This indicate the user already agreed on ImMobile policy=این نشان می دهد که کاربر قبلاً با خط مشی ImMobile موافقت کرده است
Check for ImMobile updates on startup=به‌روزرسانی‌های ImMobile را هنگام راه‌اندازی بررسی کنید
Enable it only to track issues, otherwise debug log can impact performance=آن را فقط برای ردیابی مشکلات فعال کنید، در غیر این صورت گزارش اشکال زدایی می تواند بر عملکرد تأثیر بگذارد
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=این حتی سنگین‌تر از گزارش اشکال‌زدایی است، آن را فقط در صورت تقاضا فعال کنید، در صورت عدم نیاز همیشه از خاموش بودن آن اطمینان حاصل کنید
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=ترجیحاً فعال نیست، فقط در صورتی از آن استفاده کنید که مشکل راه اندازی دارید که باید ردیابی شود
This wave player with very basic UI for testing only, and may not support all wave types=این پخش کننده موج با رابط کاربری بسیار ابتدایی فقط برای آزمایش است و ممکن است از همه انواع موج پشتیبانی نکند
Show test settings, they can broke the UI, Restart required=نمایش تنظیمات تست، آنها می توانند UI را شکسته، راه اندازی مجدد لازم است
Auto change background with suggested image to math theme colors=تغییر خودکار پس‌زمینه با تصویر پیشنهادی به رنگ‌های تم ریاضی
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=ظاهر پس‌زمینه، Fill تصویر را با توجه به نسبت ابعاد آن تغییر می‌دهد، Fit کل تصویر را در داخل صفحه نمایش می‌دهد، Stretch تصویر را پر می‌کند.
Helpful to choose the color when background set to None.=هنگامی که پس‌زمینه روی هیچ‌کدام تنظیم می‌شود، برای انتخاب رنگ مفید است.
Fit=مناسب
Stretch=کشش
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=عملکرد بهتری ارائه می دهد، پنجره تنها در صورت فوکوس ارائه می شود، در غیر این صورت غیرفعال ظاهر می شود
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=برای استفاده پایدار، هنگامی که فوکوس از دست می‌رود، صفحه‌کلید را پنهان نمی‌کنیم (مگر اینکه آن را فعال کرده باشید)، نماد اسلش چشمی وجود دارد که معمولاً به پنهان کردن صفحه‌کلید کمک می‌کند.
Default behavior for touch keyboard when popup appear=رفتار پیش‌فرض برای صفحه‌کلید لمسی هنگام ظاهر شدن پنجره بازشو
Adjust the max size of window ticker at taskbar, helpful for smaller screens=حداکثر اندازه تیک تیک پنجره را در نوار وظیفه تنظیم کنید، برای صفحات کوچکتر مفید است
Use old menu without graphic icons, flat simple icons only=از منوی قدیمی بدون آیکون های گرافیکی، فقط از نمادهای ساده و مسطح استفاده کنید
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=از دکمه‌های ساده برای آیتم‌های شبکه استفاده کنید، این معمولاً در صورت افت فریم در ثانیه پیش‌فرض است، اما می‌توانید همیشه آن را مجبور کنید، برای عملکرد بهتر است
Enable scroll if tap and drag up or down=در صورت ضربه زدن و کشیدن به بالا یا پایین، اسکرول را فعال کنید
Navigate between tabs on swipe left/right=با کشیدن انگشت به چپ/راست بین برگه‌ها حرکت کنید
Show/Hide start menu when you swipe up/down on home grid=نمایش/پنهان کردن منوی شروع هنگام کشیدن انگشت به بالا/پایین در شبکه اصلی
Open text editor in read only mode by default=ویرایشگر متن را به طور پیش فرض در حالت فقط خواندنی باز کنید
Backup copies will be located at ImMobile Data/backups=نسخه های پشتیبان در ImMobile Data/Backup ها قرار خواهند گرفت
Light palette=پالت نور
Default palette=پالت پیش فرض
Enable keyboard controls.=فعال کردن کنترل های صفحه کلید
Enable blinking cursor (optional as some users consider it to be distracting).=مکان نما چشمک زن را فعال کنید (اختیاری است زیرا برخی از کاربران آن را منحرف کننده می دانند).
Pressing Enter will keep item active and select contents (single-line only).=با فشار دادن Enter مورد فعال نگه داشته می شود و محتویات (فقط تک خطی) انتخاب می شود.
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=تبدیل ویجت های DragXXX به ورودی متن را با یک کلیک ساده ماوس (بدون حرکت) فعال کنید.
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=کلیدهای Cmd<>Ctrl را تعویض کنید، رفتارهای مختلف سبک MacOS را فعال کنید.
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=هنگام غیرفعال کردن خطوط anti-aliasing، احتمالاً می خواهید حاشیه ها را نیز به سبک خود غیرفعال کنید.
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=خطوط سریعتر با استفاده از داده های بافت.برای رندر کردن با فیلتر دوخطی (نه نقطه/نزدیکترین فیلتر) به بکاند نیاز است.
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=ضریب آلفای اضافی برای موارد غیرفعال (ضربه بر مقدار فعلی آلفا).
Don't mess with UserAgent unless you know what are you doing=با UserAgent درگیر نشوید مگر اینکه بدانید دارید چه کار می کنید
If disabled, ImMobile will no longer be able to use internet internally, however, unofficial extensions that don't use ImMobile APIs can bypass this=اگر غیرفعال باشد، ImMobile دیگر نمی‌تواند از اینترنت به صورت داخلی استفاده کند، با این حال، برنامه‌های افزودنی غیررسمی که از APIهای ImMobile استفاده نمی‌کنند، می‌توانند این را دور بزنند.
If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=اگر از سرویس دانلود سیستم عامل غیرفعال استفاده می شود، httpClient کندتر است اما ممکن است برخی از مشکلات را حل کند، فقط در صورت مشکل آن را فعال کنید
Don't mess with API unless you know what are you doing=با API کار نکنید، مگر اینکه بدانید دارید چه کار می کنید
Log everything to individual files per instance (PELogs\{instance}\). Disable to improve performance.=همه چیز را در هر نمونه به فایل‌های جداگانه ثبت کنید (PELogs\{instance}\).برای بهبود عملکرد غیرفعال کنید.
Instance create/stop/cleanup events=به عنوان مثال ایجاد/توقف/پاکسازی رویدادها
General info messages (disables 'device busy' spam)=پیام‌های اطلاعات عمومی (غیرفعال کردن هرزنامه «دستگاه مشغول»)
Trace every API call (EXTREMELY verbose)=ردیابی هر تماس API (به شدت پرمخاطب)
BETA!, not working correctly=بتا!، درست کار نمی کند
Zoom and Scroll can be faster if value increased or slower if value reduced, Delay 1 and 2 responsible for the detection speed between two points incase of zoom, increase them to reduce the amount of zoom based on two points distance change=در صورت افزایش مقدار، زوم و اسکرول می توانند سریعتر یا در صورت کاهش مقدار آهسته تر باشند، تاخیر 1 و 2 مسئول سرعت تشخیص بین دو نقطه در صورت بزرگنمایی هستند، آنها را افزایش دهید تا میزان زوم را بر اساس تغییر فاصله دو نقطه کاهش دهید.
Scroll Speed:=سرعت اسکرول:
Release Delay:=تاخیر در انتشار:
