Privacy=Quyền riêng tư
Introduction=Giới thiệu
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Cảm ơn bạn đã lựa chọn sử dụng ImMobile.Quyền riêng tư của bạn rất quan trọng đối với tôi và tôi cam kết đảm bảo rằng trải nghiệm của bạn với ứng dụng của tôi vẫn an toàn và riêng tư.
Information Collection=Thu thập thông tin
This application is designed with your privacy in mind.=Ứng dụng này được thiết kế có tính đến quyền riêng tư của bạn.
I do not collect or gather any personal information from you.=Tôi không thu thập hoặc thu thập bất kỳ thông tin cá nhân nào từ bạn.
No data will be stored by the app.=Không có dữ liệu sẽ được lưu trữ bởi ứng dụng.
No user tracking or analytics are performed.=Không có hoạt động theo dõi hoặc phân tích người dùng nào được thực hiện.
Responsibility for Security=Trách nhiệm về an ninh
Third-Party Scripts and Extensions:=Tập lệnh và tiện ích mở rộng của bên thứ ba:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile cung cấp API nâng cao với tập lệnh hoặc tiện ích mở rộng của bên thứ ba.Hãy thận trọng khi cài đặt hoặc sử dụng những thứ này, đặc biệt nếu chúng có nguồn gốc từ các nguồn không đáng tin cậy.
User's Role in Security:=Vai trò của người dùng trong bảo mật:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Với tư cách là người dùng, bạn có trách nhiệm duy trì sự an toàn và bảo mật cho thiết bị của mình cũng như đảm bảo rằng bạn chỉ tương tác với nội dung và dịch vụ đáng tin cậy.
Potential Risks:=Rủi ro tiềm ẩn:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Việc cài đặt hoặc sử dụng tập lệnh và tiện ích mở rộng từ các nguồn không đáng tin cậy có thể dẫn đến hư hỏng hoặc mất dữ liệu.Người dùng nên cảnh giác và đánh giá độ tin cậy của các nguồn đó trước khi tiếp tục.
Disclaimer=Tuyên bố miễn trừ trách nhiệm
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Mặc dù tôi cố gắng cung cấp một môi trường an toàn nhưng tôi không thể chịu trách nhiệm về bất kỳ vấn đề nào phát sinh từ sự can thiệp của bên thứ ba hoặc việc xử lý thiết bị của bạn không phù hợp.Trách nhiệm đảm bảo an ninh của bạn thuộc về bạn, người dùng.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Bằng cách sử dụng ImMobile, bạn thừa nhận và đồng ý với chính sách quyền riêng tư này.Nếu bạn có bất kỳ câu hỏi hoặc thắc mắc nào, vui lòng liên hệ để được hỗ trợ thêm.
This privacy policy is subject to change. Please review it periodically for updates.=Chính sách bảo mật này có thể thay đổi.Vui lòng xem lại nó định kỳ để cập nhật.
