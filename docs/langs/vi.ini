If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=Nếu bật ImMobile không còn cân nhắc việc giảm FPS trên một số windows, có thể dẫn đến tải thêm với nội dung nặng
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=Tải CPU ít hơn và ít nhiệt hơn, có thể ảnh hưởng đến các vòng lặp khác như nếu bạn có trình mô phỏng âm thanh hoặc thứ gì đó tương tự
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=Hiển thị thông báo khi FPS giảm, việc tắt tính năng này sẽ chỉ tắt thông báo chứ không tắt màn hình FPS
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=Tùy chọn này có thể giảm mức sử dụng GPU rất nhiều bằng cách bỏ qua các khung hình trùng lặp, tắt nó đi khi có vấn đề
Choose folder=Chọn thư mục
Choose=chọn
