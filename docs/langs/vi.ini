It can boost loading time, but some new files may not appear until it get indexed by Windows=Nó có thể tăng thời gian tải, nhưng một số tệp mới có thể không xuất hiện cho đến khi được Windows lập chỉ mục
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Tệp/thư mục đích sẽ được thay thế nếu nó đã tồn tại, hãy cẩn thận khi tắt tính năng này có thể dẫn đến nhiều vấn đề
On locked systems, it may take more time load folders details, disable it for faster loading=Trên các hệ thống bị khóa, có thể mất nhiều thời gian tải chi tiết thư mục hơn, hãy tắt nó để tải nhanh hơn
On locked systems, it may take more time load file details, disable it for faster loading=Trên các hệ thống bị khóa, có thể mất nhiều thời gian hơn để tải chi tiết tệp, hãy tắt nó để tải nhanh hơn
When you have corrupted settings this option can fix that=Khi bạn cài đặt bị hỏng, tùy chọn này có thể khắc phục điều đó
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Trì hoãn lưu trữ các yêu cầu IO, trên hệ thống bị khóa, độ trễ rất quan trọng nhưng chậm hơn, nếu bạn có quyền truy cập root hãy tắt tùy chọn này
Don't enable this if you have build lower than 14393, it will lead to issues=Không kích hoạt tính năng này nếu bạn có bản dựng thấp hơn 14393, điều này sẽ dẫn đến sự cố
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Điều này sẽ giải quyết và sửa các gói trên SDCard nếu tồn tại, không cài đặt trên SDCard, nó có thể hữu ích nếu bạn muốn cài đặt các trò chơi lớn
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Theo mặc định, kích thước thư mục calc chỉ tính toán các tập tin gốc chứ không phải thư mục con, tuy nhiên việc kích hoạt điều này có thể dẫn đến việc tải vô tận cụ thể cho ổ đĩa gốc
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Điều này sẽ cố gắng xem trước và tải hình ảnh bằng hình thu nhỏ được tối ưu hóa, nếu không nó sẽ chuyển sang tệp thô
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Điều này sẽ cố gắng sử dụng bộ giải mã bitmap của Windows để tải hình ảnh, nếu thất bại sẽ chuyển sang trình trợ giúp stb có thể chậm hơn một chút
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Điều này sẽ tạo ra Mips cho kết cấu được tải, nó hữu ích để có chất lượng tốt hơn nhưng sẽ sử dụng nhiều bộ nhớ GPU hơn
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Bất kỳ hình ảnh nào lớn hơn kích thước tối đa cho phép sẽ bị nén, điều này có thể dẫn đến độ trễ nhiều, nhưng hình ảnh nén sẽ được lưu vào bộ đệm
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Bất kỳ biểu tượng nào lớn hơn kích thước tối đa cho phép sẽ bị nén, điều này có thể dẫn đến độ trễ nhiều, nhưng biểu tượng nén sẽ được lưu vào bộ đệm
This indicate the user already agreed on ImMobile policy=Điều này cho thấy người dùng đã đồng ý với chính sách của ImMobile
Check for ImMobile updates on startup=Kiểm tra các bản cập nhật ImMobile khi khởi động
Enable it only to track issues, otherwise debug log can impact performance=Chỉ bật tính năng này để theo dõi sự cố, nếu không nhật ký gỡ lỗi có thể ảnh hưởng đến hiệu suất
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Điều này thậm chí còn nặng hơn nhật ký gỡ lỗi, chỉ kích hoạt nó theo yêu cầu, luôn đảm bảo tắt nó nếu không cần thiết
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Không ưu tiên bật, chỉ sử dụng nó nếu bạn gặp sự cố khởi động cần được theo dõi
This wave player with very basic UI for testing only, and may not support all wave types=Trình phát sóng này có giao diện người dùng rất cơ bản chỉ để thử nghiệm và có thể không hỗ trợ tất cả các loại sóng
Show test settings, they can broke the UI, Restart required=Hiển thị cài đặt thử nghiệm, chúng có thể phá vỡ giao diện người dùng, Yêu cầu khởi động lại
Auto change background with suggested image to math theme colors=Tự động thay đổi hình nền với hình ảnh gợi ý thành màu chủ đề toán học
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Giao diện nền, Fill sẽ chia tỷ lệ hình ảnh theo tỷ lệ khung hình, Fit sẽ chứa toàn bộ hình ảnh bên trong màn hình, Stretch sẽ lấp đầy và làm nổi bật hình ảnh.
Helpful to choose the color when background set to None.=Hữu ích khi chọn màu khi nền được đặt thành Không có.
Fit=Phù hợp
Stretch=Căng ra
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Sẽ cung cấp hiệu suất tốt hơn, cửa sổ sẽ chỉ được hiển thị nếu lấy nét, nếu không nó sẽ xuất hiện dưới dạng không hoạt động
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=Để sử dụng ổn định, chúng tôi không ẩn bàn phím khi mất tiêu điểm (trừ khi bạn bật tính năng đó), có biểu tượng dấu gạch chéo mắt thường giúp ẩn bàn phím
Default behavior for touch keyboard when popup appear=Hành vi mặc định cho bàn phím cảm ứng khi cửa sổ bật lên xuất hiện
Adjust the max size of window ticker at taskbar, helpful for smaller screens=Điều chỉnh kích thước tối đa của mã đánh dấu cửa sổ trên thanh tác vụ, hữu ích cho màn hình nhỏ hơn
Use old menu without graphic icons, flat simple icons only=Sử dụng menu cũ không có biểu tượng đồ họa, chỉ có biểu tượng phẳng đơn giản
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=Sử dụng các nút đơn giản cho các mục dạng lưới, nút này thường được mặc định nếu phát hiện thấy hiện tượng giảm khung hình/giây nhưng bạn có thể buộc nó luôn, sẽ tốt hơn cho hiệu suất
Enable scroll if tap and drag up or down=Cho phép cuộn nếu chạm và kéo lên hoặc xuống
Navigate between tabs on swipe left/right=Điều hướng giữa các tab khi vuốt sang trái/phải
Show/Hide start menu when you swipe up/down on home grid=Hiển thị/Ẩn menu bắt đầu khi bạn vuốt lên/xuống trên lưới chính
Open text editor in read only mode by default=Mở trình soạn thảo văn bản ở chế độ chỉ đọc theo mặc định
Backup copies will be located at ImMobile Data/backups=Các bản sao lưu sẽ được đặt tại ImMobile Data/backups
Light palette=Bảng màu sáng
Default palette=Bảng màu mặc định
Enable keyboard controls.=Bật điều khiển bàn phím.
Enable blinking cursor (optional as some users consider it to be distracting).=Bật con trỏ nhấp nháy (tùy chọn vì một số người dùng cho rằng nó gây mất tập trung).
Pressing Enter will keep item active and select contents (single-line only).=Nhấn Enter sẽ giữ mục hoạt động và chọn nội dung (chỉ một dòng).
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=Cho phép biến các tiện ích DragXXX thành kiểu nhập văn bản chỉ bằng một cú nhấp chuột đơn giản (không cần di chuyển).
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=Hoán đổi các phím Cmd<>Ctrl, kích hoạt các hành vi kiểu MacOS khác nhau.
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=Khi tắt các dòng khử răng cưa, có thể bạn cũng sẽ muốn tắt đường viền theo phong cách của mình.
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=Dòng nhanh hơn bằng cách sử dụng dữ liệu kết cấu.Yêu cầu chương trình phụ trợ hiển thị bằng tính năng lọc song tuyến tính (không phải lọc điểm/gần nhất).
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=Hệ số alpha bổ sung cho các mục bị vô hiệu hóa (nhân với giá trị hiện tại của Alpha).
Don't mess with UserAgent unless you know what are you doing=Đừng gây rối với UserAgent trừ khi bạn biết mình đang làm gì
If disabled, ImMobile will no longer be able to use internet internally, however, unofficial extensions that don't use ImMobile APIs can bypass this=Nếu bị tắt, ImMobile sẽ không thể sử dụng Internet nội bộ nữa, tuy nhiên, các tiện ích mở rộng không chính thức không sử dụng API ImMobile có thể bỏ qua điều này
If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=Nếu dịch vụ tải xuống hệ điều hành bị vô hiệu hóa sẽ được sử dụng, httpClient sẽ chậm hơn nhưng có thể giải quyết một số vấn đề, chỉ bật nó nếu bạn gặp vấn đề
Don't mess with API unless you know what are you doing=Đừng gây rối với API trừ khi bạn biết mình đang làm gì
Log everything to individual files per instance (PELogs\{instance}\). Disable to improve performance.=Ghi nhật ký mọi thứ vào từng tệp riêng lẻ cho mỗi phiên bản (PELogs\{instance}\).Vô hiệu hóa để cải thiện hiệu suất.
Instance create/stop/cleanup events=Sự kiện tạo/dừng/dọn dẹp phiên bản
General info messages (disables 'device busy' spam)=Tin nhắn thông tin chung (vô hiệu hóa thư rác 'thiết bị bận')
Trace every API call (EXTREMELY verbose)=Theo dõi mọi lệnh gọi API (CỰC KỲ dài dòng)
BETA!, not working correctly=BETA!, không hoạt động chính xác
Zoom and Scroll can be faster if value increased or slower if value reduced, Delay 1 and 2 responsible for the detection speed between two points incase of zoom, increase them to reduce the amount of zoom based on two points distance change=Thu phóng và Cuộn có thể nhanh hơn nếu giá trị tăng hoặc chậm hơn nếu giá trị giảm, Độ trễ 1 và 2 chịu trách nhiệm về tốc độ phát hiện giữa hai điểm trong trường hợp thu phóng, tăng chúng để giảm mức thu phóng dựa trên thay đổi khoảng cách hai điểm
