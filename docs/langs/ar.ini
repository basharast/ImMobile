On locked systems, it may take more time load file details, disable it for faster loading=في الأنظمة المقفلة، قد يستغرق تحميل تفاصيل الملفات وقتاً أطول، قم بتعطيله لتحميل أسرع
When you have corrupted settings this option can fix that=يمكن لهذا الخيار إصلاح الإعدادات المعطوبة
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=تأخير طلبات إدخال/إخراج التخزين. التأخير مهم لكنه أبطأ على الأنظمة المقفلة. إذا كان لديك وصول جذر (Root)، عطل هذا الخيار
Don't enable this if you have build lower than 14393, it will lead to issues=لا تفعل هذا الخيار إذا كان بناء النظام أقل من 14393، فقد يسبب مشاكل
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=سيعمل هذا على حل وإصلاح التطبيقات الموجودة على بطاقة SD إن وُجدت، وليس التثبيت عليها. مفيد لتثبيت الألعاب الكبيرة
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=افتراضياً، يتم حساب حجم الملفات الأساسية فقط وليس المجلدات الفرعية. تفعيل هذا قد يسبب تحميلاً لا ينتهي خاصة في قرص النظام (Root)
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=سيحاول معاينة وتحميل الصور باستخدام صور مصغرة محسنة، وإلا سيلجأ للملف الأصلي
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=سيحاول استخدام فك تشفير النقطية في ويندوز لتحميل الصورة، وإن فشل سيلجأ لمساعدي stb والتي قد تكون أبطأ
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=سينشئ Mips للنسيج المحمّل. مفيد لجودة أفضل، لكنه يستهلك ذاكرة رسومات أكبر
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=أي صورة أكبر من الحد المسموح سيتم ضغطها، قد يسبب ذلك تأخيراً كبيراً، لكن الصورة المضغوطة ستُخزن مؤقتاً
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=أي أيقونة أكبر من الحد المسموح سيتم ضغطها، قد يسبب ذلك تأخيراً كبيراً، لكن الأيقونة المضغوطة ستُخزن مؤقتاً
This indicate the user already agreed on ImMobile policy=هذا يشير إلى أن المستخدم وافق مسبقاً على سياسة ImMobile
Check for ImMobile updates on startup=التحقق من تحديثات ImMobile عند بدء التشغيل
Enable it only to track issues, otherwise debug log can impact performance=قم بتفعيله فقط لتتبع المشاكل، وإلا قد يؤثر سجل التصحيح على الأداء
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=هذا أثقل من سجل التصحيح، قم بتفعيله عند الحاجة فقط، وتأكد دائماً من إيقافه إن لم يكن مطلوباً
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=لا يفضل تفعيله، استخدمه فقط إذا كانت لديك مشكلة في بدء التشغيل تحتاج للتتبع
This wave player with very basic UI for testing only, and may not support all wave types=مشغل wave هذا بواجهة بسيطة جداً للاختبار فقط، وقد لا يدعم جميع أنواع wave
Show test settings, they can broke the UI, Restart required=إظهار إعدادات الاختبار، قد تكسر الواجهة. يتطلب إعادة التشغيل
Auto change background with suggested image to math theme colors=تغيير الخلفية تلقائياً بصورة مقترحة لتناسب ألوان السمة
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=مظهر الخلفية: "ملء" لتكبير الصورة مع الحفاظ على الأبعاد، "احتواء" لعرضها كاملة، "تمدد" لملء الشاشة بتمديد الصورة.
Helpful to choose the color when background set to None.=مفيد لاختيار اللون عندما تكون الخلفية "بدون".
Fit=احتواء
Stretch=تمدد
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=سيوفر أداءً أفضل، سترسم النافذة فقط عند التركيز عليها وإلا ستظهر كأنها غير نشطة
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=لاستخدام مستقر، لا نخفي لوحة المفاتيح عند فقدان التركيز (إلا إذا قمت بتفعيل ذلك)، هناك أيقونة عين مشطوبة تساعد عادة في إخفائها
Default behavior for touch keyboard when popup appear=السلوك الافتراضي للوحة المفاتيح التي تعمل باللمس عند ظهور نافذة منبثقة
Adjust the max size of window ticker at taskbar, helpful for smaller screens=ضبط الحد الأقصى لحجم شريط النافذة في شريط المهام، مفيد للشاشات الصغيرة
Use old menu without graphic icons, flat simple icons only=استخدام القائمة القديمة بدون أيقونات رسومية، فقط أيقونات مسطحة بسيطة
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=استخدام أزرار بسيطة لعناصر الشبكة. هذا افتراضي عند انخفاض الإطارات، لكن يمكنك فرضه دائماً لأداء أفضل
Enable scroll if tap and drag up or down=تفعيل التمرير إذا نقرت وسحبت لأعلى أو لأسفل
Navigate between tabs on swipe left/right=التنقل بين التبويبات بالسحب يميناً/يساراً
Show/Hide start menu when you swipe up/down on home grid=إظهار/إخفاء قائمة ابدأ عند السحب لأعلى/لأسفل في الشبكة الرئيسية
Open text editor in read only mode by default=فتح محرر النصوص في وضع القراءة فقط افتراضياً
Backup copies will be located at ImMobile Data/backups=ستوضع النسخ الاحتياطية في ImMobile Data/backups
Light palette=لوحة ألوان فاتحة
Default palette=لوحة ألوان إفتراضية
Enable keyboard controls.=تفعيل تحكم لوحة المفاتيح.
Enable blinking cursor (optional as some users consider it to be distracting).=تفعيل وميض المؤشر (اختياري حيث يعتبره البعض مزعجاً).
Pressing Enter will keep item active and select contents (single-line only).=ضغط إدخال (Enter) سيبقي العنصر نشطاً ويحدد المحتوى (سطر واحد فقط).
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=تفعيل تحويل أدوات DragXXX لإدخال نصي بنقرة بسيطة للفأرة وإفلاتها (دون تحريك).
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=التبديل بين مفتاحي Cmd و Ctrl، وتفعيل سلوكيات مشابهة لـ MacOS.
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=عند تعطيل خطوط التنعيم (anti-aliasing)، قد ترغب بتعطيل الحدود في النمط الخاص بك أيضاً.
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=خطوط أسرع باستخدام بيانات النسيج. يتطلب تصيير بخاصية التصفية الثنائية (bilinear filtering).
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=مضاعف ألفا إضافي للعناصر المعطلة (يُضرب في قيمة ألفا الحالية).
Don't mess with UserAgent unless you know what are you doing=لا تعبث بـ UserAgent إلا إذا كنت تعرف ما تفعله
If disabled, ImMobile will no longer be able to use internet internally, however, unofficial extensions that don't use ImMobile APIs can bypass this=إذا تم تعطيله، لن يتمكن ImMobile من استخدام الإنترنت داخلياً. ومع ذلك، يمكن للإضافات غير الرسمية التي لا تستخدم واجهات برمجة تطبيقات ImMobile تجاوز ذلك
If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=إذا تم تعطيله ستُستخدم خدمة التنزيل الخاصة بالنظام. httpClient أبطأ لكنه قد يحل بعض المشاكل، فعّله فقط إذا واجهت مشكلة
Don't mess with API unless you know what are you doing=لا تعبث بـ API إلا إذا كنت تعرف ما تفعله
Log everything to individual files per instance (PELogs\{instance}\). Disable to improve performance.=تسجيل كل شيء في ملفات فردية لكل نسخة (PELogs\{instance}\). قم بتعطيله لتحسين الأداء.
Instance create/stop/cleanup events=أحداث إنشاء/إيقاف/تنظيف النسخة
General info messages (disables 'device busy' spam)=رسائل المعلومات العامة (يعطل رسائل "الجهاز مشغول" المزعجة)
Trace every API call (EXTREMELY verbose)=تتبع كل استدعاء API (مفصل للغاية)
BETA!, not working correctly=تجريبي, لا يعمل حالياً
Zoom and Scroll can be faster if value increased or slower if value reduced, Delay 1 and 2 responsible for the detection speed between two points incase of zoom, increase them to reduce the amount of zoom based on two points distance change=يمكن أن يكون التكبير/التصغير والتمرير أسرع إذا زادت القيمة أو أبطأ إذا انخفضت القيمة، التأخير 1 و 2 مسؤولان عن سرعة الكشف بين نقطتين في حالة التكبير، زيادتهما لتقليل مقدار التكبير بناءً على تغير المسافة بين نقطتين
