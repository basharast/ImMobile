Privacy=الخصوصية
Introduction=مقدمة
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=خصوصيتك تهمني وأنا ملتزم بضمان بقاء تجربتك آمنة وخاصة.
Information Collection=جمع المعلومات
This application is designed with your privacy in mind.=تم تصميم هذا التطبيق مع مراعاة خصوصيتك.
I do not collect or gather any personal information from you.=لا أقوم بجمع أي معلومات شخصية منك.
No data will be stored by the app.=لن يتم تخزين أي بيانات بواسطة التطبيق.
No user tracking or analytics are performed.=لا يتم إجراء أي تتبع أو تحليلات للمستخدم.
Responsibility for Security=مسؤولية الأمن
Third-Party Scripts and Extensions:=سكربتات وإضافات جهات خارجية:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=يوفر هذا التطبيق واجهة برمجة تطبيقات متقدمة مع سكربتات أو إضافات خارجية. يرجى توخي الحذر عند التثبيت خاصة من مصادر غير موثوقة.
User's Role in Security:=دور المستخدم في الأمن:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=بصفتك مستخدمًا، أنت مسؤول عن الحفاظ على أمان جهازك وضمان التفاعل مع المحتوى الموثوق فقط.
Potential Risks:=المخاطر المحتملة:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=تثبيت سكربتات أو إضافات من مصادر غير موثوقة قد يؤدي إلى فقدان البيانات. يجب التقييم قبل المتابعة.
Disclaimer=إخلاء المسؤولية
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=رغم السعي لتوفير بيئة آمنة، لا أتحمل مسؤولية أي مشكلات ناتجة عن تدخل جهات خارجية أو الاستخدام غير السليم للجهاز. المسؤولية تقع عليك.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=باستخدام ImMobile، أنت توافق على هذه السياسة. إذا كانت لديك أسئلة، فلا تتردد في التواصل.
This privacy policy is subject to change. Please review it periodically for updates.=هذه السياسة قابلة للتغيير. يرجى مراجعتها بشكل دوري.
