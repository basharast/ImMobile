If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=إذا تم التفعيل، لن يقوم ImMobile بتقليل الإطارات على بعض النوافذ، مما قد يؤدي لضغط إضافي مع المحتوى الثقيل
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=حمل معالج أقل وحرارة أقل، قد يؤثر على أشياء أخرى كالمحاكاة الصوتية
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=إظهار إشعار عند انخفاض الإطارات، تعطيل هذا سيلغي الإشعار فقط وليس المراقبة
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=هذا الخيار قد يقلل استهلاك الرسومات بتخطي الإطارات المكررة، أوقفه إذا ظهرت مشاكل
Choose folder=اختر المجلد
