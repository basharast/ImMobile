It can boost loading time, but some new files may not appear until it get indexed by Windows=Může prodloužit dobu načítání, ale některé nové soubory se nemusí objevit, dokud nebudou indexovány systémem Windows
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Cílový soubor/složka bude nahrazena, pokud již existuje, buďte opatrní, vypnutí tohoto může vést k mnoha problémům
On locked systems, it may take more time load folders details, disable it for faster loading=Na zamčených systémech může načítání podrobností složek trvat déle, pro rychlejší načítání je deaktivujte
On locked systems, it may take more time load file details, disable it for faster loading=Na zamčených systémech může načítání podrobností souboru trvat déle, pro rychlejší načítání je deaktivujte
When you have corrupted settings this option can fix that=Pokud máte poškozená nastavení, tato možnost to může opravit
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Zpoždění požadavků na úložiště IO, na uzamčeném systému je zpoždění důležité, ale pomalejší, pokud máte přístup root, tuto možnost deaktivujte
Don't enable this if you have build lower than 14393, it will lead to issues=Toto nepovolujte, pokud máte sestavení nižší než 14393, povede to k problémům
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=To vyřeší a opraví balíčky na SDCard, pokud existuje, neinstaluje na SDCard, může to být užitečné, pokud chcete nainstalovat velké hry
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Ve výchozím nastavení velikosti složky calc se počítají pouze kořenové soubory, nikoli podsložky, ale povolení tohoto může vést k nekonečnému načítání specificky pro kořenový disk
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=To se pokusí zobrazit náhled a načíst obrázky podle optimalizované miniatury, jinak se vrátí k raw souboru
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Toto se pokusí použít bitmapový dekodér Windows k načtení obrázku, pokud selže, vrátí se k pomocníkům stb, což může být o něco pomalejší
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Tím se vygenerují Mips pro načtenou texturu, je to užitečné pro lepší kvalitu, ale použije se více paměti GPU
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Jakýkoli obrázek větší než povolená maximální velikost bude komprimován, což může vést k velkému zpoždění, ale komprimovaný obrázek bude uložen do mezipaměti
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Každá ikona větší než povolená maximální velikost bude komprimována, což může vést k velkému zpoždění, ale komprimovaná ikona bude uložena do mezipaměti
This indicate the user already agreed on ImMobile policy=To znamená, že uživatel již souhlasil se zásadami společnosti ImMobile
