Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Vzhled pozadí, Vyplnit změní měřítko obrázku s ohledem na jeho poměr stran, Přizpůsobit bude obsahovat celý obrázek na obrazovce, Roztáhnout obrázek vyplní a roztáhne.
