If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=Pokud je tato možnost povolena, ImMobile již neuvažuje o snižování FPS u některých oken, může to vést k dodatečnému zatížení těžkým obsahem
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=Menší zatížení CPU a méně tepla může ovlivnit další smyčky, jako když máte emulaci zvuku nebo něco podobného
