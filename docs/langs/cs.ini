Privacy=soukromí
Introduction=Úvod
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Děkujeme, že jste se rozhodli používat ImMobile.Vaše soukromí je pro mě důležité a zavazuji se zajistit, že vaše zkušenosti s mou aplikací zůstanou bezpečné a soukromé.
Information Collection=Sběr informací
This application is designed with your privacy in mind.=Tato aplikace je navržena s ohledem na vaše soukromí.
I do not collect or gather any personal information from you.=Neshromažďuji ani neshromažďuji od vás žádné osobní údaje.
No data will be stored by the app.=Aplikace nebudou ukládat žádná data.
No user tracking or analytics are performed.=Neprovádí se žádné sledování ani analýzy uživatelů.
Responsibility for Security=Zodpovědnost za bezpečnost
Third-Party Scripts and Extensions:=Skripty a rozšíření třetích stran:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile nabízí pokročilé API se skripty nebo rozšířeními třetích stran.Při instalaci nebo používání těchto zařízení buďte opatrní, zejména pokud pocházejí z nedůvěryhodných zdrojů.
User's Role in Security:=Role uživatele v zabezpečení:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Jako uživatel jste odpovědní za udržování bezpečnosti a zabezpečení svého zařízení a za to, že budete pracovat pouze s důvěryhodným obsahem a službami.
Potential Risks:=Možná rizika:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Instalace nebo používání skriptů a rozšíření z nedůvěryhodných zdrojů může vést k potenciálnímu poškození nebo ztrátě dat.Uživatelé by měli být ostražití a než budou pokračovat, měli by posoudit důvěryhodnost takových zdrojů.
Disclaimer=Zřeknutí se odpovědnosti
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=I když se snažím poskytovat bezpečné prostředí, nemohu nést odpovědnost za žádné problémy, které vzniknou v důsledku zásahů třetích stran nebo nevhodného zacházení s vaším zařízením.Odpovědnost za zajištění vaší bezpečnosti leží na vás, uživateli.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Používáním ImMobile berete na vědomí a souhlasíte s těmito zásadami ochrany osobních údajů.Máte-li jakékoli dotazy nebo obavy, neváhejte se obrátit na další pomoc.
This privacy policy is subject to change. Please review it periodically for updates.=Tyto zásady ochrany osobních údajů se mohou změnit.Pravidelně jej kontrolujte kvůli aktualizacím.
