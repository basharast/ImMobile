When you have corrupted settings this option can fix that=Når du har ødelagte indstillinger, kan denne mulighed løse det
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Delay Storage IO-anmodninger, på låst system er forsinkelsen vigtig, men langsommere, hvis du har root-adgang, deaktiver denne mulighed
Don't enable this if you have build lower than 14393, it will lead to issues=Aktiver ikke dette, hvis du har build lavere end 14393, det vil føre til problemer
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Dette vil løse og rette pakker på SDCard, hvis de findes, ikke installere på SDCard, det kan være nyttigt, hvis du vil installere store spil
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Som standard beregner calc-mappestørrelsen kun rodfilerne, ikke undermappen, men aktivering af dette kan føre til endeløs indlæsning specifikt for roddrevet
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Dette vil forsøge at forhåndsvise og indlæse billeder med det optimerede miniaturebillede, ellers vil det gå tilbage til råfil
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Dette vil forsøge at bruge Windows bitmap-dekoder til at indlæse billede, hvis fejl vil falde tilbage til stb-hjælpere, som kan være lidt langsommere
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Dette vil generere Mips for den indlæste tekstur, det er nyttigt for bedre kvalitet, men mere GPU-hukommelse vil blive brugt
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Ethvert billede større end den tilladte maks. størrelse vil blive komprimeret, dette kan føre til meget forsinkelse, men det komprimerede billede vil blive cachelagret
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Ethvert ikon, der er større end den tilladte maks. størrelse, vil blive komprimeret, dette kan føre til meget forsinkelse, men det komprimerede ikon vil blive cachelagret
This indicate the user already agreed on ImMobile policy=Dette indikerer, at brugeren allerede har accepteret ImMobile-politikken
Check for ImMobile updates on startup=Se efter ImMobile-opdateringer ved opstart
Enable it only to track issues, otherwise debug log can impact performance=Aktiver det kun for at spore problemer, ellers kan fejlretningslog påvirke ydeevnen
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Denne endnu mere tunge end fejlretningslog, aktiver den kun på efterspørgsel, sørg altid for, at den er slukket, hvis det ikke er nødvendigt
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Det foretrækkes ikke at være aktiveret, brug det kun, hvis du har et opstartsproblem, der skal spores
This wave player with very basic UI for testing only, and may not support all wave types=Denne wave-afspiller med meget grundlæggende brugergrænseflade kun til test og understøtter muligvis ikke alle wave-typer
Show test settings, they can broke the UI, Restart required=Vis testindstillinger, de kan bryde brugergrænsefladen, genstart påkrævet
Auto change background with suggested image to math theme colors=Skift automatisk baggrund med foreslået billede til matematiske temafarver
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Baggrundsudseende, Fyld skalerer billedet i forhold til dets billedformat, Tilpas vil indeholde hele billedet inde på skærmen, Stræk vil udfylde og forstærke billedet.
Helpful to choose the color when background set to None.=Nyttigt at vælge farven, når baggrunden er indstillet til Ingen.
Fit=Tilpas
Stretch=Stræk
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Vil give bedre ydeevne, vinduet bliver kun gengivet, hvis fokus ellers vil fremstå som inaktivt
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=For stabil brug skjuler vi ikke tastaturet, når fokus er tabt (medmindre du har aktiveret det), der er et skråstreg-ikon, der normalt hjælper med at skjule tastaturet
