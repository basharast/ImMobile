Introduction=Introduktion
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Tak fordi du valgte at bruge ImMobile.Dit privatliv er vigtigt for mig, og jeg er forpligtet til at sikre, at din oplevelse med min app forbliver sikker og privat.
Information Collection=Indsamling af oplysninger
This application is designed with your privacy in mind.=Denne applikation er designet med dit privatliv i tankerne.
I do not collect or gather any personal information from you.=Jeg indsamler eller indsamler ingen personlige oplysninger fra dig.
No data will be stored by the app.=Ingen data vil blive gemt af appen.
No user tracking or analytics are performed.=Der udføres ingen brugersporing eller analyser.
Responsibility for Security=Ansvar for sikkerhed
Third-Party Scripts and Extensions:=Tredjeparts scripts og udvidelser:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile tilbyder avanceret API med tredjepartsscripts eller udvidelser.Vær forsigtig, når du installerer eller bruger disse, især hvis de stammer fra upålidelige kilder.
User's Role in Security:=Brugerens rolle i sikkerhed:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Som bruger er du ansvarlig for at opretholde sikkerheden og sikkerheden på din enhed og sikre, at du kun interagerer med pålideligt indhold og tjenester.
Potential Risks:=Potentielle risici:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Installation eller brug af scripts og udvidelser fra upålidelige kilder kan føre til potentiel skade eller tab af data.Brugere bør være årvågne og vurdere pålideligheden af ​​sådanne kilder, før de fortsætter.
Disclaimer=Ansvarsfraskrivelse
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Selvom jeg stræber efter at levere et sikkert miljø, kan jeg ikke holdes ansvarlig for eventuelle problemer, der opstår som følge af tredjepartsinterferens eller upassende håndtering af din enhed.Ansvaret for at sikre din sikkerhed ligger hos dig, brugeren.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Ved at bruge ImMobile anerkender og accepterer du denne privatlivspolitik.Hvis du har spørgsmål eller bekymringer, er du velkommen til at kontakte os for yderligere hjælp.
This privacy policy is subject to change. Please review it periodically for updates.=Denne privatlivspolitik kan ændres.Gennemgå det med jævne mellemrum for opdateringer.
