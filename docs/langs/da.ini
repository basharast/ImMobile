Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Målfil/mappe vil blive erstattet, hvis den allerede eksisterede, vær forsigtig med at slå denne fra kan føre til en masse problemer
On locked systems, it may take more time load folders details, disable it for faster loading=På låste systemer kan det tage længere tid at indlæse mappedetaljer, deaktiver det for hurtigere indlæsning
