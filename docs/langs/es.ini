If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=Si ImMobile está habilitado, ya no considera reducir FPS en algunas ventanas, lo que puede generar una carga adicional con contenido pesado.
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=Menos carga de CPU y menos calor, pueden afectar otros bucles, como si tuviera emulación de audio o algo así.
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=Mostrar notificación cuando bajen los FPS; deshabilitar esto solo deshabilitará la notificación, no el monitor de FPS
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=Esta opción puede reducir mucho el uso de la GPU al omitir los fotogramas duplicados; desactívela en caso de problemas.
Choose folder=Elige carpeta
Choose=elegir
Choose folder..=Elige carpeta..
It can boost loading time, but some new files may not appear until it get indexed by Windows=Puede aumentar el tiempo de carga, pero es posible que algunos archivos nuevos no aparezcan hasta que Windows los indexe.
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=El archivo/carpeta de destino se reemplazará si ya existe; tenga cuidado, desactivarlo puede provocar muchos problemas.
On locked systems, it may take more time load folders details, disable it for faster loading=En sistemas bloqueados, puede llevar más tiempo cargar los detalles de las carpetas; desactívelo para una carga más rápida.
On locked systems, it may take more time load file details, disable it for faster loading=En sistemas bloqueados, puede llevar más tiempo cargar los detalles del archivo; desactívelo para una carga más rápida.
When you have corrupted settings this option can fix that=Cuando tienes configuraciones corruptas, esta opción puede solucionarlo.
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Retrasar las solicitudes de E/S de almacenamiento; en un sistema bloqueado el retraso es importante pero más lento; si tiene acceso raíz, desactive esta opción
Don't enable this if you have build lower than 14393, it will lead to issues=No habilite esto si tiene una compilación inferior a 14393, ya que generará problemas
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Esto resolverá y reparará los paquetes en la tarjeta SD, si existen, no los instalará en la tarjeta SD; puede ser útil si desea instalar juegos grandes.
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=De forma predeterminada, el tamaño de la carpeta de cálculo solo calcula los archivos raíz, no las subcarpetas; sin embargo, habilitar esto puede generar una carga interminable específicamente para la unidad raíz.
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Esto intentará obtener una vista previa y cargar imágenes mediante la miniatura optimizada; de lo contrario, recurrirá al archivo sin formato.
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Esto intentará utilizar el decodificador de mapa de bits de Windows para cargar la imagen; si falla, recurrirá a los ayudantes de stb, que pueden ser un poco más lentos.
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Esto generará Mips para la textura cargada, es útil para obtener una mejor calidad, pero se utilizará más memoria de GPU.
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Cualquier imagen mayor que el tamaño máximo permitido se comprimirá, lo que puede provocar un gran retraso, pero la imagen comprimida se almacenará en caché.
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Cualquier icono que supere el tamaño máximo permitido se comprimirá, lo que puede provocar un gran retraso, pero el icono comprimido se almacenará en caché.
This indicate the user already agreed on ImMobile policy=Esto indica que el usuario ya aceptó la política de ImMobile.
Check for ImMobile updates on startup=Busque actualizaciones de ImMobile al iniciar
Enable it only to track issues, otherwise debug log can impact performance=Habilítelo solo para realizar un seguimiento de los problemas; de lo contrario, el registro de depuración puede afectar el rendimiento.
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Esto es incluso más pesado que el registro de depuración, habilítelo solo bajo demanda, asegúrese siempre de que esté desactivado si no es necesario.
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=No es preferible habilitarlo, úselo solo si tiene un problema de inicio que necesita ser rastreado.
This wave player with very basic UI for testing only, and may not support all wave types=Este reproductor de ondas tiene una interfaz de usuario muy básica solo para pruebas y es posible que no sea compatible con todos los tipos de ondas.
Show test settings, they can broke the UI, Restart required=Mostrar configuración de prueba, pueden dañar la interfaz de usuario, es necesario reiniciar
Auto change background with suggested image to math theme colors=Cambio automático de fondo con imagen sugerida a colores del tema matemático
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Apariencia del fondo, Rellenar escalará la imagen con respecto a su relación de aspecto, Ajustar contendrá la imagen completa dentro de la pantalla, Estirar rellenará y estirará la imagen.
Helpful to choose the color when background set to None.=Es útil elegir el color cuando el fondo está configurado en Ninguno.
Fit=Encajar
Stretch=Estirar
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Proporcionará un mejor rendimiento, la ventana se representará solo si está enfocada; de lo contrario, aparecerá como inactiva
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=Para un uso estable, no ocultamos el teclado una vez que se pierde el foco (a menos que lo haya habilitado), hay un ícono de barra diagonal que generalmente ayuda a ocultar el teclado.
Default behavior for touch keyboard when popup appear=Comportamiento predeterminado para el teclado táctil cuando aparece una ventana emergente
Adjust the max size of window ticker at taskbar, helpful for smaller screens=Ajuste el tamaño máximo del ticker de la ventana en la barra de tareas, útil para pantallas más pequeñas
Use old menu without graphic icons, flat simple icons only=Utilice el menú antiguo sin íconos gráficos, solo íconos simples y planos
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=Use botones simples para los elementos de la cuadrícula, esto generalmente es predeterminado si se detecta una caída de fps, pero siempre puede forzarlo, mejor para el rendimiento.
Enable scroll if tap and drag up or down=Habilite el desplazamiento si toca y arrastra hacia arriba o hacia abajo
Navigate between tabs on swipe left/right=Navegar entre pestañas al deslizar hacia la izquierda/derecha
Show/Hide start menu when you swipe up/down on home grid=Mostrar/ocultar el menú de inicio al deslizar el dedo hacia arriba o hacia abajo en la cuadrícula de inicio
Open text editor in read only mode by default=Abrir el editor de texto en modo de solo lectura de forma predeterminada
Backup copies will be located at ImMobile Data/backups=Las copias de seguridad se ubicarán en ImMobile Data/backups
Light palette=paleta de luz
Default palette=Paleta predeterminada
Enable keyboard controls.=Habilite los controles del teclado.
Enable blinking cursor (optional as some users consider it to be distracting).=Habilite el cursor parpadeante (opcional ya que algunos usuarios consideran que distrae).
Pressing Enter will keep item active and select contents (single-line only).=Al presionar Enter se mantendrá el elemento activo y se seleccionará el contenido (solo una línea).
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=Habilite la conversión de widgets DragXXX en entrada de texto con un simple clic y liberación del mouse (sin moverse).
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=Intercambie las teclas Cmd<>Ctrl y habilite varios comportamientos de estilo MacOS.
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=Al deshabilitar las líneas suavizadas, probablemente también querrás deshabilitar los bordes en tu estilo.
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=Multiplicador alfa adicional para elementos deshabilitados (multiplicar por el valor actual de Alfa).
Don't mess with UserAgent unless you know what are you doing=No te metas con UserAgent a menos que sepas lo que estás haciendo
If disabled, ImMobile will no longer be able to use internet internally, however, unofficial extensions that don't use ImMobile APIs can bypass this=Si está deshabilitado, ImMobile ya no podrá usar Internet internamente; sin embargo, las extensiones no oficiales que no usan las API de ImMobile pueden evitar esto.
If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=Si se utilizará el servicio de descarga del sistema operativo deshabilitado, httpClient será más lento pero puede resolver algunos problemas; habilítelo solo si tiene problemas
Don't mess with API unless you know what are you doing=No te metas con la API a menos que sepas lo que estás haciendo
Log everything to individual files per instance (PELogs\{instance}\). Disable to improve performance.=Log everything to individual files per instance (PELogs\{instance}\). Disable to improve performance.
Instance create/stop/cleanup events=Eventos de creación/detención/limpieza de instancias
General info messages (disables 'device busy' spam)=Mensajes de información general (desactiva el spam de "dispositivo ocupado")
