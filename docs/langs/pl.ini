This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=To rozwiąże i naprawi pakiety na karcie SDCard, jeśli istnieją, a nie zainstaluje na karcie SDCard, może to być pomocne, jeśli chcesz zainstalować duże gry
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Domyślnie rozmiar folderu calc oblicza tylko pliki główne, a nie podfolder, jednak włączenie tej opcji może prowadzić do niekończącego się ładowania, szczególnie dla dysku głównego
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Spowoduje to próbę wyświetlenia podglądu i załadowania obrazów według zoptymalizowanej miniatury, w przeciwnym razie nastąpi powrót do pliku nieprzetworzonego
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Spowoduje to próbę użycia dekodera mapy bitowej systemu Windows do załadowania obrazu, w przypadku niepowodzenia nastąpi powrót do pomocników stb, które mogą być nieco wolniejsze
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Spowoduje to wygenerowanie Mipsów dla załadowanej tekstury, jest to pomocne dla lepszej jakości, ale zostanie użyte więcej pamięci GPU
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Każdy obraz większy niż dozwolony maksymalny rozmiar zostanie skompresowany, co może prowadzić do dużych opóźnień, ale skompresowany obraz zostanie zapisany w pamięci podręcznej
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Każda ikona większa niż dozwolony maksymalny rozmiar zostanie skompresowana, co może prowadzić do dużych opóźnień, ale skompresowana ikona zostanie zapisana w pamięci podręcznej
