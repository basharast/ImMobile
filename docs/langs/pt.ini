Introduction=Introdução
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Obrigado por escolher usar o ImMobile.Sua privacidade é importante para mim e estou empenhado em garantir que sua experiência com meu aplicativo permaneça segura e privada.
Information Collection=Coleta de informações
This application is designed with your privacy in mind.=Este aplicativo foi projetado pensando na sua privacidade.
I do not collect or gather any personal information from you.=Eu não coleto ou recolho nenhuma informação pessoal sua.
No data will be stored by the app.=Nenhum dado será armazenado pelo aplicativo.
No user tracking or analytics are performed.=Nenhum rastreamento ou análise de usuário é realizado.
Responsibility for Security=Responsabilidade pela Segurança
Third-Party Scripts and Extensions:=Scripts e extensões de terceiros:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile oferece API avançada com scripts ou extensões de terceiros.Tenha cuidado ao instalar ou usar estes, especialmente se forem provenientes de fontes não confiáveis.
User's Role in Security:=Papel do usuário na segurança:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Como usuário, você é responsável por manter a segurança do seu dispositivo e garantir que interage apenas com conteúdos e serviços confiáveis.
Potential Risks:=Riscos potenciais:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Instalar ou usar scripts e extensões de fontes não confiáveis pode causar possíveis danos ou perda de dados.Os usuários devem estar atentos e avaliar a confiabilidade de tais fontes antes de prosseguir.
Disclaimer=Isenção de responsabilidade
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Embora eu me esforce para fornecer um ambiente seguro, não posso ser responsabilizado por quaisquer problemas que surjam da interferência de terceiros ou do manuseio inadequado do seu dispositivo.A responsabilidade de garantir a sua segurança é sua, usuário.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Ao usar o ImMobile, você reconhece e concorda com esta política de privacidade.Se você tiver alguma dúvida ou preocupação, sinta-se à vontade para entrar em contato para obter mais assistência.
This privacy policy is subject to change. Please review it periodically for updates.=Esta política de privacidade está sujeita a alterações.Revise-o periodicamente para atualizações.
