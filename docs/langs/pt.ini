Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Atrasar solicitações de IO de armazenamento, em sistema bloqueado o atraso é importante, mas mais lento, se você tiver acesso root desative esta opção
Don't enable this if you have build lower than 14393, it will lead to issues=Não habilite isto se você tiver uma compilação inferior a 14393, isso causará problemas
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Isso resolverá e corrigirá pacotes no SDCard, se existir, não instalará no SDCard, pode ser útil se você deseja instalar jogos grandes
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Por padrão, o tamanho da pasta calc calcula apenas os arquivos raiz e não a subpasta, no entanto, ativar isso pode levar a um carregamento infinito especificamente para a unidade raiz
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Isso tentará visualizar e carregar imagens pela miniatura otimizada, caso contrário, retornará ao arquivo bruto
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Isso tentará usar o decodificador de bitmap do Windows para carregar a imagem; se falhar, recorrerá aos auxiliares stb, que podem ser um pouco mais lentos
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Isto irá gerar Mips para a textura carregada, é útil para uma melhor qualidade, mas mais memória GPU será usada
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Qualquer imagem maior que o tamanho máximo permitido será compactada, o que pode levar a muito atraso, mas a imagem compactada será armazenada em cache
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Qualquer ícone maior que o tamanho máximo permitido será compactado, o que pode levar a muito atraso, mas o ícone compactado será armazenado em cache
This indicate the user already agreed on ImMobile policy=Isso indica que o usuário já concordou com a política da ImMobile
Check for ImMobile updates on startup=Verifique se há atualizações do ImMobile na inicialização
Enable it only to track issues, otherwise debug log can impact performance=Ative-o apenas para rastrear problemas, caso contrário, o log de depuração poderá afetar o desempenho
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Isso é ainda mais pesado que o log de depuração, habilite-o somente sob demanda, certifique-se sempre de que esteja desligado se não for necessário
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Não é preferível que esteja ativado, use-o apenas se tiver problemas de inicialização que precisam ser rastreados
This wave player with very basic UI for testing only, and may not support all wave types=Este reprodutor de ondas com interface de usuário muito básica apenas para teste e pode não suportar todos os tipos de ondas
Show test settings, they can broke the UI, Restart required=Mostrar configurações de teste, elas podem quebrar a IU, é necessário reiniciar
Auto change background with suggested image to math theme colors=Mudança automática de fundo com imagem sugerida para cores do tema matemático
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Aparência do plano de fundo, Preencher dimensionará a imagem em relação à sua proporção, Ajustar conterá a imagem inteira dentro da tela, Esticar preencherá e ampliará a imagem.
Helpful to choose the color when background set to None.=Útil escolher a cor quando o plano de fundo estiver definido como Nenhum.
Fit=Ajustar
Stretch=Esticar
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Fornecerá melhor desempenho, a janela será renderizada apenas se estiver em foco, caso contrário, aparecerá como inativa
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=Para um uso estável, não ocultamos o teclado quando o foco é perdido (a menos que você tenha ativado isso), há um ícone de barra ocular que geralmente ajuda a ocultar o teclado
Default behavior for touch keyboard when popup appear=Comportamento padrão do teclado virtual quando o pop-up aparece
