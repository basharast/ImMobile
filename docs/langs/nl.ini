Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Het doelbestand/de doelmap wordt vervangen als deze al bestond. Wees voorzichtig als u dit uitschakelt, dit kan tot veel problemen leiden
On locked systems, it may take more time load folders details, disable it for faster loading=Op vergrendelde systemen kan het langer duren om de mapgegevens te laden. Schakel dit uit voor sneller laden
