If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=Als de uitgeschakelde downloadservice voor het besturingssysteem wordt gebruikt, is httpClient langzamer, maar kan dit enkele problemen oplossen. Schakel deze alleen in als u een probleem ondervindt
Don't mess with API unless you know what are you doing=Knoei niet met de API, tenzij je weet wat je doet
