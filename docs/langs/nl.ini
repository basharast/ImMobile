Privacy=Privacy
Introduction=Introductie
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Bedankt dat u voor ImMobile heeft gekozen.Uw privacy is belangrijk voor mij en ik doe er alles aan om ervoor te zorgen dat uw ervaring met mijn app veilig en privé blijft.
Information Collection=Informatieverzameling
This application is designed with your privacy in mind.=Deze applicatie is ontworpen met uw privacy in gedachten.
I do not collect or gather any personal information from you.=Ik verzamel of verzamel geen persoonlijke informatie van u.
No data will be stored by the app.=Er worden geen gegevens opgeslagen door de app.
No user tracking or analytics are performed.=Er worden geen gebruikerstracking of analyses uitgevoerd.
Responsibility for Security=Verantwoordelijkheid voor veiligheid
Third-Party Scripts and Extensions:=Scripts en extensies van derden:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile biedt een geavanceerde API met scripts of extensies van derden.Wees voorzichtig bij het installeren of gebruiken hiervan, vooral als ze afkomstig zijn van niet-vertrouwde bronnen.
User's Role in Security:=Rol van de gebruiker in de beveiliging:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Als gebruiker bent u verantwoordelijk voor het handhaven van de veiligheid en beveiliging van uw apparaat en ervoor te zorgen dat u alleen communiceert met vertrouwde inhoud en services.
Potential Risks:=Potentiële risico's:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Het installeren of gebruiken van scripts en extensies van onbetrouwbare bronnen kan leiden tot potentiële schade of gegevensverlies.Gebruikers moeten waakzaam zijn en de betrouwbaarheid van dergelijke bronnen beoordelen voordat ze verder gaan.
Disclaimer=Disclaimer
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Hoewel ik ernaar streef een veilige omgeving te bieden, kan ik niet verantwoordelijk worden gehouden voor eventuele problemen die voortvloeien uit tussenkomst van derden of de ongepaste omgang met uw apparaat.De verantwoordelijkheid voor het garanderen van uw veiligheid ligt bij u, de gebruiker.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Door ImMobile te gebruiken, erkent u en gaat u akkoord met dit privacybeleid.Als u vragen of opmerkingen heeft, kunt u contact opnemen voor verdere hulp.
This privacy policy is subject to change. Please review it periodically for updates.=Dit privacybeleid kan worden gewijzigd.Controleer het regelmatig voor updates.
