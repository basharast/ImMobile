Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Vertraag opslag-IO-verzoeken, op een vergrendeld systeem is de vertraging belangrijk, maar langzamer. Als u root-toegang hebt, schakelt u deze optie uit
Don't enable this if you have build lower than 14393, it will lead to issues=Schakel dit niet in als u een build lager dan 14393 heeft, dit zal tot problemen leiden
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Dit zal pakketten op SDCard oplossen en repareren, indien aanwezig, niet installeren op SDCard, het kan handig zijn als je grote games wilt installeren
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Standaard berekent de calc-mapgrootte alleen de hoofdbestanden en niet de submap, maar dit inschakelen kan leiden tot eindeloos laden, specifiek voor de hoofdschijf
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Hiermee wordt geprobeerd afbeeldingen te bekijken en te laden via de geoptimaliseerde miniatuur, anders wordt teruggevallen op het onbewerkte bestand
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Dit zal proberen de Windows bitmap-decoder te gebruiken om de afbeelding te laden. Als dit niet lukt, wordt teruggevallen op stb-helpers, die mogelijk wat langzamer zijn
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Dit genereert Mips voor de geladen textuur, het is nuttig voor een betere kwaliteit, maar er zal meer GPU-geheugen worden gebruikt
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Elke afbeelding die groter is dan de toegestane maximale grootte, wordt gecomprimeerd. Dit kan tot veel vertraging leiden, maar de gecomprimeerde afbeelding wordt in de cache opgeslagen
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Elk pictogram dat groter is dan de toegestane maximale grootte wordt gecomprimeerd. Dit kan tot veel vertraging leiden, maar het gecomprimeerde pictogram wordt in de cache opgeslagen
This indicate the user already agreed on ImMobile policy=Dit geeft aan dat de gebruiker al akkoord is gegaan met het ImMobile-beleid
Check for ImMobile updates on startup=Controleer op ImMobile-updates bij het opstarten
Enable it only to track issues, otherwise debug log can impact performance=Schakel dit alleen in om problemen bij te houden, anders kan het foutopsporingslogboek de prestaties beïnvloeden
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Dit is nog zwaarder dan het debug-logboek, schakel het alleen op aanvraag in en zorg er altijd voor dat het uit staat als het niet nodig is
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Het heeft niet de voorkeur om te worden ingeschakeld. Gebruik het alleen als u een opstartprobleem heeft dat moet worden gevolgd
This wave player with very basic UI for testing only, and may not support all wave types=Deze wave-speler heeft een zeer eenvoudige gebruikersinterface die alleen bedoeld is om te testen en ondersteunt mogelijk niet alle golftypen
Show test settings, they can broke the UI, Restart required=Toon testinstellingen, ze kunnen de gebruikersinterface kapot maken, opnieuw opstarten vereist
Auto change background with suggested image to math theme colors=Achtergrond automatisch wijzigen met voorgestelde afbeelding naar wiskundethemakleuren
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Achtergrondweergave, Vullen zal de afbeelding schalen met betrekking tot de beeldverhouding, Passend zal de hele afbeelding binnen het scherm bevatten, Uitrekken zal de afbeelding vullen en verstevigen.
Helpful to choose the color when background set to None.=Handig om de kleur te kiezen als de achtergrond is ingesteld op Geen.
Fit=Pasvorm
Stretch=Strek
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Zorgt voor betere prestaties, het venster wordt alleen weergegeven als er op wordt gefocust, anders wordt het als inactief weergegeven
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=Voor stabiel gebruik verbergen we het toetsenbord niet zodra de focus verloren is gegaan (tenzij je dat hebt ingeschakeld), het oog-slash-pictogram dat meestal helpt om het toetsenbord te verbergen
Default behavior for touch keyboard when popup appear=Standaardgedrag voor aanraaktoetsenbord wanneer pop-up verschijnt
Adjust the max size of window ticker at taskbar, helpful for smaller screens=Pas de maximale grootte van de vensterticker op de taakbalk aan, handig voor kleinere schermen
Use old menu without graphic icons, flat simple icons only=Gebruik het oude menu zonder grafische pictogrammen, alleen platte, eenvoudige pictogrammen
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=Gebruik eenvoudige knoppen voor rasteritems. Dit is meestal standaard als er een fps-daling wordt gedetecteerd, maar je kunt dit altijd forceren, beter voor de prestaties
Enable scroll if tap and drag up or down=Schakel scrollen in als u tikt en omhoog of omlaag sleept
Navigate between tabs on swipe left/right=Navigeer tussen tabbladen door naar links/rechts te vegen
Show/Hide start menu when you swipe up/down on home grid=Toon/verberg het startmenu wanneer u omhoog/omlaag veegt op het thuisraster
Open text editor in read only mode by default=Open de teksteditor standaard in de alleen-lezen-modus
