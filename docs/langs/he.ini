Privacy=פרטיות
Introduction=הקדמה
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=תודה שבחרת להשתמש ב-ImMobile.הפרטיות שלך חשובה לי, ואני מחויב להבטיח שהחוויה שלך עם האפליקציה שלי תישאר בטוחה ופרטית.
Information Collection=איסוף מידע
This application is designed with your privacy in mind.=אפליקציה זו תוכננה תוך מחשבה על הפרטיות שלך.
I do not collect or gather any personal information from you.=אני לא אוסף או אוסף מידע אישי ממך.
No data will be stored by the app.=שום נתונים לא יאוחסנו על ידי האפליקציה.
No user tracking or analytics are performed.=לא מתבצע מעקב או ניתוח של משתמשים.
Responsibility for Security=אחריות לאבטחה
Third-Party Scripts and Extensions:=סקריפטים והרחבות של צד שלישי:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile מציעה API מתקדם עם סקריפטים או הרחבות של צד שלישי.אנא היזהר בעת התקנה או שימוש בהם, במיוחד אם מקורם במקורות לא מהימנים.
User's Role in Security:=תפקיד המשתמש באבטחה:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=כמשתמש, אתה אחראי לשמירה על הבטיחות והאבטחה של המכשיר שלך ולהבטיח שאתה מקיים אינטראקציה רק עם תוכן ושירותים מהימנים.
Potential Risks:=סיכונים פוטנציאליים:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=התקנה או שימוש בסקריפטים ותוספים ממקורות לא מהימנים עלולים להוביל לנזק פוטנציאלי או לאובדן נתונים.על המשתמשים להיות ערניים ולהעריך את מהימנותם של מקורות כאלה לפני שהם ממשיכים.
Disclaimer=כתב ויתור
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=למרות שאני שואף לספק סביבה מאובטחת, אינני יכול לשאת באחריות לכל בעיה הנובעת מהפרעות של צד שלישי או מטיפול לא הולם במכשיר שלך.האחריות להבטחת אבטחתך מוטלת עליך, המשתמש.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=על ידי שימוש ב-ImMobile, אתה מאשר ומסכים למדיניות פרטיות זו.אם יש לך שאלות או חששות, אל תהסס לפנות לקבלת סיוע נוסף.
This privacy policy is subject to change. Please review it periodically for updates.=מדיניות פרטיות זו נתונה לשינויים.אנא עיין בו מעת לעת לקבלת עדכונים.
