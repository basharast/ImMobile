Privacy=Απόρρητο
Introduction=Εισαγωγή
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Σας ευχαριστούμε που επιλέξατε να χρησιμοποιήσετε το ImMobile.Το απόρρητό σας είναι σημαντικό για μένα και δεσμεύομαι να διασφαλίσω ότι η εμπειρία σας με την εφαρμογή μου παραμένει ασφαλής και ιδιωτική.
Information Collection=Συλλογή Πληροφοριών
This application is designed with your privacy in mind.=Αυτή η εφαρμογή έχει σχεδιαστεί με γνώμονα το απόρρητό σας.
I do not collect or gather any personal information from you.=Δεν συλλέγω ούτε συλλέγω προσωπικά στοιχεία από εσάς.
No data will be stored by the app.=Δεν θα αποθηκευτούν δεδομένα από την εφαρμογή.
No user tracking or analytics are performed.=Δεν πραγματοποιείται παρακολούθηση ή ανάλυση χρηστών.
Responsibility for Security=Ευθύνη για την Ασφάλεια
Third-Party Scripts and Extensions:=Σενάρια και επεκτάσεις τρίτων:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=Το ImMobile προσφέρει προηγμένο API με σενάρια ή επεκτάσεις τρίτων.Να είστε προσεκτικοί κατά την εγκατάσταση ή τη χρήση αυτών, ειδικά εάν προέρχονται από μη αξιόπιστες πηγές.
User's Role in Security:=Ο ρόλος του χρήστη στην ασφάλεια:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Ως χρήστης, είστε υπεύθυνοι για τη διατήρηση της ασφάλειας και της ασφάλειας της συσκευής σας και τη διασφάλιση ότι αλληλεπιδράτε μόνο με αξιόπιστο περιεχόμενο και υπηρεσίες.
Potential Risks:=Πιθανοί κίνδυνοι:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Η εγκατάσταση ή η χρήση σεναρίων και επεκτάσεων από μη αξιόπιστες πηγές μπορεί να οδηγήσει σε πιθανή ζημιά ή απώλεια δεδομένων.Οι χρήστες θα πρέπει να είναι προσεκτικοί και να αξιολογούν την αξιοπιστία τέτοιων πηγών πριν προχωρήσουν.
Disclaimer=Αποποίηση ευθύνης
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Ενώ προσπαθώ να παρέχω ένα ασφαλές περιβάλλον, δεν μπορώ να θεωρηθώ υπεύθυνος για τυχόν ζητήματα που προκύπτουν από παρεμβολές τρίτων ή από ακατάλληλο χειρισμό της συσκευής σας.Η ευθύνη για τη διασφάλιση της ασφάλειάς σας ανήκει σε εσάς, τον χρήστη.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Χρησιμοποιώντας το ImMobile, αναγνωρίζετε και συμφωνείτε με αυτήν την πολιτική απορρήτου.Εάν έχετε οποιεσδήποτε ερωτήσεις ή ανησυχίες, μη διστάσετε να απευθυνθείτε για περαιτέρω βοήθεια.
This privacy policy is subject to change. Please review it periodically for updates.=Αυτή η πολιτική απορρήτου υπόκειται σε αλλαγές.Ελέγξτε το περιοδικά για ενημερώσεις.
