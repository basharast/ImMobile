Don't enable this if you have build lower than 14393, it will lead to issues=اگر آپ نے 14393 سے کم تعمیر کی ہے تو اسے فعال نہ کریں، اس سے مسائل پیدا ہوں گے۔
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=یہ SDCard پر موجود پیکیجز کو حل اور ٹھیک کر دے گا، SDCard پر انسٹال نہیں، اگر آپ بڑے گیمز انسٹال کرنا چاہتے ہیں تو یہ مددگار ثابت ہو سکتا ہے۔
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=بطور ڈیفالٹ کیلک فولڈر سائز صرف روٹ فائلوں کی گنتی کرتا ہے نہ کہ ذیلی فولڈر، تاہم اسے فعال کرنے سے خاص طور پر روٹ ڈرائیو کے لیے لامتناہی لوڈنگ ہو سکتی ہے۔
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=یہ آپٹمائزڈ تھمب نیل کے ذریعے تصاویر کا پیش نظارہ کرنے اور لوڈ کرنے کی کوشش کرے گا، بصورت دیگر یہ خام فائل میں واپس آجائے گی۔
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=یہ تصویر کو لوڈ کرنے کے لیے ونڈوز بٹ میپ ڈیکوڈر کو استعمال کرنے کی کوشش کرے گا، اگر فیل ہونے کی صورت میں ایس ٹی بی ہیلپرز کو فال بیک کیا جائے گا جو قدرے سست ہو سکتا ہے۔
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=یہ بھری ہوئی ساخت کے لیے Mips تیار کرے گا، یہ بہتر کوالٹی کے لیے مددگار ہے، لیکن مزید GPU میموری استعمال کی جائے گی۔
