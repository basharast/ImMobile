This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=یہ آپشن ڈپلیکیٹ فریموں کو چھوڑ کر GPU کے استعمال کو بہت کم کر سکتا ہے، مسائل کی صورت میں اسے بند کر دیں
