On locked systems, it may take more time load file details, disable it for faster loading=مقفل سسٹمز پر، فائل کی تفصیلات لوڈ کرنے میں زیادہ وقت لگ سکتا ہے، تیز لوڈنگ کے لیے اسے غیر فعال کریں۔
