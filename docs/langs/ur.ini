Introduction=تعارف
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=ImMobile استعمال کرنے کے لیے آپ کا شکریہ۔آپ کی رازداری میرے لیے اہم ہے، اور میں اس بات کو یقینی بنانے کے لیے پرعزم ہوں کہ میری ایپ کے ساتھ آپ کا تجربہ محفوظ اور نجی رہے۔
Information Collection=معلومات کا مجموعہ
This application is designed with your privacy in mind.=یہ ایپلیکیشن آپ کی پرائیویسی کو مدنظر رکھتے ہوئے بنائی گئی ہے۔
I do not collect or gather any personal information from you.=میں آپ سے کوئی ذاتی معلومات اکٹھا یا اکٹھا نہیں کرتا ہوں۔
No data will be stored by the app.=ایپ کے ذریعہ کوئی ڈیٹا محفوظ نہیں کیا جائے گا۔
No user tracking or analytics are performed.=کوئی صارف سے باخبر رہنے یا تجزیات نہیں کیے جاتے ہیں۔
Responsibility for Security=سیکیورٹی کی ذمہ داری
Third-Party Scripts and Extensions:=فریق ثالث کے اسکرپٹس اور ایکسٹینشنز:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile تھرڈ پارٹی اسکرپٹس یا ایکسٹینشن کے ساتھ جدید API پیش کرتا ہے۔براہ کرم ان کو انسٹال کرتے یا استعمال کرتے وقت احتیاط برتیں، خاص طور پر اگر وہ ناقابل اعتماد ذرائع سے پیدا ہوتے ہیں۔
User's Role in Security:=سیکورٹی میں صارف کا کردار:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=بطور صارف، آپ اپنے آلے کی حفاظت اور حفاظت کو برقرار رکھنے اور اس بات کو یقینی بنانے کے ذمہ دار ہیں کہ آپ صرف قابل اعتماد مواد اور خدمات کے ساتھ تعامل کرتے ہیں۔
Potential Risks:=ممکنہ خطرات:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=غیر بھروسہ مند ذرائع سے اسکرپٹس اور ایکسٹینشنز کو انسٹال کرنا یا استعمال کرنا ممکنہ نقصان یا ڈیٹا کے نقصان کا باعث بن سکتا ہے۔صارفین کو ہوشیار رہنا چاہیے اور آگے بڑھنے سے پہلے ایسے ذرائع کی اعتباریت کا اندازہ لگا لینا چاہیے۔
Disclaimer=ڈس کلیمر
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=جب کہ میں ایک محفوظ ماحول فراہم کرنے کی کوشش کرتا ہوں، مجھے کسی ایسے مسئلے کے لیے ذمہ دار نہیں ٹھہرایا جا سکتا جو فریق ثالث کی مداخلت یا آپ کے آلے کے نامناسب ہینڈلنگ سے پیدا ہوں۔آپ کی حفاظت کو یقینی بنانے کی ذمہ داری آپ پر ہے، صارف۔
