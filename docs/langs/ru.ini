Don't use Microsoft base render, Restart required=Не используйте базовый рендеринг Microsoft, требуется перезагрузка
If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=Если включено, ImMobile больше не учитывает снижение FPS в некоторых окнах, это может привести к дополнительной нагрузке тяжелым контентом.
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=Меньшая нагрузка на процессор и меньшее нагревание могут повлиять на другие циклы, например, если у вас есть эмуляция звука или что-то в этом роде.
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=Показывать уведомление при падении FPS. Отключение этого параметра приведет к отключению только уведомления, а не монитора FPS.
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=Эта опция может значительно сократить использование графического процессора, пропуская дублированные кадры. Отключите ее в случае возникновения проблем.
Choose folder=Выбрать папку
Choose=Выберите
Choose folder..=Выберите папку..
It can boost loading time, but some new files may not appear until it get indexed by Windows=Это может ускорить загрузку, но некоторые новые файлы могут не появиться, пока они не проиндексируются Windows.
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Целевой файл/папка будет заменена, если она уже существует. Будьте осторожны, отключение этого параметра может привести к множеству проблем.
On locked systems, it may take more time load folders details, disable it for faster loading=В заблокированных системах загрузка сведений о папках может занять больше времени, отключите эту функцию для более быстрой загрузки.
On locked systems, it may take more time load file details, disable it for faster loading=В заблокированных системах загрузка сведений о файле может занять больше времени. Для более быстрой загрузки отключите эту функцию.
When you have corrupted settings this option can fix that=Если у вас повреждены настройки, эта опция может это исправить.
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Задержка запросов ввода-вывода хранилища. В заблокированной системе задержка важна, но медленнее. Если у вас есть root-доступ, отключите эту опцию.
Don't enable this if you have build lower than 14393, it will lead to issues=Не включайте это, если у вас сборка ниже 14393, это приведет к проблемам.
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Это позволит разрешить и исправить пакеты на SDCard, если они существуют, а не устанавливать на SDCard. Это может быть полезно, если вы хотите установить большие игры.
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=По умолчанию размер папки Calc рассчитывает только корневые файлы, а не подпапку, однако включение этого параметра может привести к бесконечной загрузке специально для корневого диска.
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Будет предпринята попытка предварительного просмотра и загрузки изображений с помощью оптимизированного эскиза, в противном случае произойдет возврат к необработанному файлу.
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Будет предпринята попытка использовать декодер растровых изображений Windows для загрузки изображения, в случае неудачи произойдет возврат к помощникам stb, которые могут немного медленнее.
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Это создаст Mips для загруженной текстуры, это полезно для лучшего качества, но будет использоваться больше памяти графического процессора.
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Любое изображение, размер которого превышает максимально допустимый, будет сжато. Это может привести к большой задержке, но сжатое изображение будет кэшировано.
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Любой значок, размер которого превышает максимально допустимый, будет сжат. Это может привести к значительной задержке, но сжатый значок будет кэширован.
This indicate the user already agreed on ImMobile policy=Это означает, что пользователь уже согласился с политикой ImMobile.
Check for ImMobile updates on startup=Проверка обновлений ImMobile при запуске
Enable it only to track issues, otherwise debug log can impact performance=Включайте его только для отслеживания проблем, иначе журнал отладки может повлиять на производительность.
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Это даже сложнее, чем журнал отладки, включайте его только по требованию и всегда отключайте его, если он не требуется.
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Не рекомендуется включать его, используйте его только в том случае, если у вас есть проблемы с запуском, которые необходимо отслеживать.
This wave player with very basic UI for testing only, and may not support all wave types=Этот проигрыватель волн с очень простым пользовательским интерфейсом предназначен только для тестирования и может поддерживать не все типы волн.
Show test settings, they can broke the UI, Restart required=Покажите настройки теста, они могут сломать пользовательский интерфейс. Требуется перезагрузка.
Auto change background with suggested image to math theme colors=Автоматическое изменение фона с предлагаемым изображением на цвета математической темы
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Внешний вид фона, «Заливка» масштабирует изображение в соответствии с его соотношением сторон, «Подгонка» будет содержать все изображение внутри экрана, «Растянуть» заполнит и склеит изображение.
Helpful to choose the color when background set to None.=Полезно выбрать цвет, когда для фона установлено значение «Нет».
Fit=Подходит
Stretch=Растянуть
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Обеспечит лучшую производительность, окно будет отображаться только в том случае, если оно находится в фокусе, в противном случае оно будет отображаться как неактивное.
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=Для стабильного использования мы не скрываем клавиатуру после потери фокуса (если вы не включили это), есть значок косой черты, который обычно помогает скрыть клавиатуру.
Default behavior for touch keyboard when popup appear=Поведение по умолчанию для сенсорной клавиатуры при появлении всплывающего окна
Adjust the max size of window ticker at taskbar, helpful for smaller screens=Отрегулируйте максимальный размер бегущей строки окна на панели задач, что полезно для небольших экранов.
Use old menu without graphic icons, flat simple icons only=Используйте старое меню без графических значков, только плоские простые значки.
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=Используйте простые кнопки для элементов сетки. Обычно это используется по умолчанию, если обнаружено падение частоты кадров, но вы всегда можете принудительно использовать это, что лучше для производительности.
Enable scroll if tap and drag up or down=Включить прокрутку, если коснуться и перетащить вверх или вниз
Navigate between tabs on swipe left/right=Перемещайтесь между вкладками свайпом влево/вправо.
Show/Hide start menu when you swipe up/down on home grid=Показать/скрыть меню «Пуск» при проведении пальцем вверх/вниз по домашней сетке
Open text editor in read only mode by default=Открыть текстовый редактор в режиме только для чтения по умолчанию
Backup copies will be located at ImMobile Data/backups=Резервные копии будут находиться в папке ImMobile Data/backups.
Light palette=Светлая палитра
Default palette=Палитра по умолчанию
Enable keyboard controls.=Включите управление с клавиатуры.
Enable blinking cursor (optional as some users consider it to be distracting).=Включите мигающий курсор (необязательно, поскольку некоторые пользователи считают, что это отвлекает).
Pressing Enter will keep item active and select contents (single-line only).=Нажатие Enter сохранит активность элемента и выберет содержимое (только в одну строку).
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=Включите преобразование виджетов DragXXX в текстовый ввод простым щелчком мыши (без перемещения).
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=Поменяйте местами клавиши Cmd<>Ctrl, включите различные варианты поведения в стиле MacOS.
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=При отключении сглаживания линий вы, вероятно, захотите также отключить границы в своем стиле.
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=Более быстрые линии с использованием данных текстуры.Требовать, чтобы серверная часть выполняла рендеринг с использованием билинейной фильтрации (а не точечной/ближайшей фильтрации).
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=Дополнительный множитель альфа для отключенных элементов (умножается на текущее значение альфа).
Don't mess with UserAgent unless you know what are you doing=Не связывайтесь с UserAgent, если не знаете, что делаете.
If disabled, ImMobile will no longer be able to use internet internally, however, unofficial extensions that don't use ImMobile APIs can bypass this=Если этот параметр отключен, ImMobile больше не сможет использовать Интернет внутри себя, однако неофициальные расширения, которые не используют API ImMobile, могут обойти это.
If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=Если будет использоваться отключенная служба загрузки ОС, httpClient будет работать медленнее, но может решить некоторые проблемы. Включайте его только в случае возникновения проблем.
Don't mess with API unless you know what are you doing=Не связывайтесь с API, если не знаете, что делаете.
Log everything to individual files per instance (PELogs\{instance}\). Disable to improve performance.=Записывайте все в отдельные файлы для каждого экземпляра (PELogs\{instance}\).Отключите, чтобы улучшить производительность.
Instance create/stop/cleanup events=События создания/остановки/очистки экземпляра
General info messages (disables 'device busy' spam)=Общие информационные сообщения (отключает спам «устройство занято»)
Trace every API call (EXTREMELY verbose)=Отслеживание каждого вызова API (ОЧЕНЬ многословно)
BETA!, not working correctly=БЕТА!, работает некорректно
Zoom and Scroll can be faster if value increased or slower if value reduced, Delay 1 and 2 responsible for the detection speed between two points incase of zoom, increase them to reduce the amount of zoom based on two points distance change=Масштабирование и прокрутка могут быть быстрее, если значение увеличено, или медленнее, если значение уменьшено. Задержка 1 и 2 отвечают за скорость обнаружения между двумя точками в случае масштабирования. Увеличьте их, чтобы уменьшить масштаб масштабирования в зависимости от изменения расстояния до двух точек.
