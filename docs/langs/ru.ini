Privacy=Конфиденциальность
Introduction=Введение
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Благодарим вас за выбор использования ImMobile.Ваша конфиденциальность важна для меня, и я стремлюсь к тому, чтобы ваше использование моего приложения оставалось безопасным и конфиденциальным.
Information Collection=Сбор информации
This application is designed with your privacy in mind.=Это приложение разработано с учетом вашей конфиденциальности.
I do not collect or gather any personal information from you.=Я не собираю и не собираю от вас никакой личной информации.
No data will be stored by the app.=Никакие данные не будут храниться в приложении.
No user tracking or analytics are performed.=Никакое отслеживание и анализ пользователей не производится.
Responsibility for Security=Ответственность за безопасность
Third-Party Scripts and Extensions:=Сторонние скрипты и расширения:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile предлагает расширенный API со сторонними скриптами или расширениями.Будьте осторожны при их установке или использовании, особенно если они получены из ненадежных источников.
User's Role in Security:=Роль пользователя в безопасности:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Как пользователь вы несете ответственность за поддержание безопасности и защищенности своего устройства и за обеспечение взаимодействия только с надежным контентом и услугами.
Potential Risks:=Потенциальные риски:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Установка или использование скриптов и расширений из ненадежных источников может привести к потенциальному повреждению или потере данных.Пользователям следует проявлять бдительность и оценивать достоверность таких источников, прежде чем продолжить.
Disclaimer=Отказ от ответственности
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Хотя я стремлюсь обеспечить безопасную среду, я не могу нести ответственность за любые проблемы, возникающие в результате вмешательства третьих лиц или ненадлежащего обращения с вашим устройством.Ответственность за обеспечение вашей безопасности лежит на вас, как на пользователе.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Используя ImMobile, вы признаете и соглашаетесь с настоящей политикой конфиденциальности.Если у вас есть какие-либо вопросы или проблемы, не стесняйтесь обращаться за дополнительной помощью.
This privacy policy is subject to change. Please review it periodically for updates.=Данная политика конфиденциальности может быть изменена.Пожалуйста, периодически просматривайте его на предмет обновлений.
