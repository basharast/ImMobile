Responsibility for Security=安全责任
Third-Party Scripts and Extensions:=第三方脚本和扩展：
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile 提供带有第三方脚本或扩展的高级 API。安装或使用它们时请小心，特别是当它们来自不受信任的来源时。
User's Role in Security:=用户在安全方面的角色：
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=作为用户，您有责任维护设备的安全性，并确保您仅与受信任的内容和服务进行交互。
Potential Risks:=潜在风险：
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=安装或使用来自不受信任来源的脚本和扩展可能会导致潜在的损坏或数据丢失。用户应保持警惕，并在继续操作之前评估此类来源的可信度。
Disclaimer=免责声明
