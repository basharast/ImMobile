If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=Si ImMobile est activé, n'envisagez plus de réduire les FPS sur certaines fenêtres, cela peut entraîner une charge supplémentaire avec un contenu lourd
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=Moins de charge CPU et moins de chaleur, cela peut avoir un impact sur d'autres boucles, comme si vous aviez une émulation audio ou quelque chose comme ça
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=Afficher la notification lorsque le FPS chute. La désactiver ne désactivera que la notification et non le moniteur FPS.
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=Cette option peut réduire considérablement l'utilisation du GPU en ignorant les images dupliquées, désactivez-la en cas de problème.
