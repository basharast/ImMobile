It can boost loading time, but some new files may not appear until it get indexed by Windows=Cela peut augmenter le temps de chargement, mais certains nouveaux fichiers peuvent ne pas apparaître tant qu'ils n'ont pas été indexés par Windows.
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Le fichier/dossier cible sera remplacé s'il existait déjà. Attention, désactiver cette option peut entraîner de nombreux problèmes.
On locked systems, it may take more time load folders details, disable it for faster loading=Sur les systèmes verrouillés, le chargement des détails des dossiers peut prendre plus de temps, désactivez-le pour un chargement plus rapide
On locked systems, it may take more time load file details, disable it for faster loading=Sur les systèmes verrouillés, le chargement des détails du fichier peut prendre plus de temps, désactivez-le pour un chargement plus rapide
When you have corrupted settings this option can fix that=Lorsque vous avez des paramètres corrompus, cette option peut résoudre ce problème
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Retarder les demandes d'E/S de stockage, sur un système verrouillé, le délai est important mais plus lent, si vous avez un accès root, désactivez cette option
Don't enable this if you have build lower than 14393, it will lead to issues=N'activez pas cette option si votre version est inférieure à 14393, cela entraînera des problèmes.
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Cela résoudra et réparera les packages sur SDCard s'ils existent, et non les installera sur SDCard, cela peut être utile si vous souhaitez installer des jeux volumineux.
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Par défaut, la taille du dossier de calcul ne calcule que les fichiers racine et non les sous-dossiers. Cependant, l'activer peut entraîner un chargement sans fin spécifiquement pour le lecteur racine.
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Cela tentera de prévisualiser et de charger les images à l'aide de la vignette optimisée, sinon le fichier brut sera utilisé.
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Cela tentera d'utiliser le décodeur bitmap Windows pour charger l'image. En cas d'échec, les assistants STB seront utilisés, ce qui peut être un peu plus lent.
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Cela générera des Mips pour la texture chargée, c'est utile pour une meilleure qualité, mais plus de mémoire GPU sera utilisée
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Toute image plus grande que la taille maximale autorisée sera compressée, cela peut entraîner beaucoup de retard, mais l'image compressée sera mise en cache.
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Toute icône plus grande que la taille maximale autorisée sera compressée, cela peut entraîner beaucoup de retard, mais l'icône compressée sera mise en cache.
This indicate the user already agreed on ImMobile policy=Cela indique que l'utilisateur a déjà accepté la politique ImMobile
Check for ImMobile updates on startup=Recherchez les mises à jour ImMobile au démarrage
Enable it only to track issues, otherwise debug log can impact performance=Activez-le uniquement pour suivre les problèmes, sinon le journal de débogage peut avoir un impact sur les performances
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=C'est encore plus lourd que le journal de débogage, activez-le à la demande uniquement, assurez-vous toujours qu'il est désactivé s'il n'est pas nécessaire
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Il n'est pas préférable de l'activer, utilisez-le uniquement si vous rencontrez un problème de démarrage qui doit être suivi.
This wave player with very basic UI for testing only, and may not support all wave types=Ce lecteur de vagues avec une interface utilisateur très basique à des fins de test uniquement et peut ne pas prendre en charge tous les types de vagues
Show test settings, they can broke the UI, Restart required=Afficher les paramètres de test, ils peuvent casser l'interface utilisateur, redémarrage requis
Auto change background with suggested image to math theme colors=Changer automatiquement l'arrière-plan avec l'image suggérée en couleurs du thème mathématique
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Apparence de l'arrière-plan, Remplir redimensionnera l'image par rapport à son rapport hauteur/largeur, Ajuster contiendra toute l'image à l'intérieur de l'écran, Étirer remplira et agrandira l'image.
Helpful to choose the color when background set to None.=Utile pour choisir la couleur lorsque l’arrière-plan est défini sur Aucun.
Fit=Ajustement
Stretch=Étirer
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Fournit de meilleures performances, la fenêtre ne sera rendue que si elle est focalisée, sinon elle apparaîtra comme inactive
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=Pour une utilisation stable, nous ne masquons pas le clavier une fois le focus perdu (sauf si vous l'avez activé), il y a une icône en forme d'oeil qui aide généralement à masquer le clavier.
Default behavior for touch keyboard when popup appear=Comportement par défaut du clavier tactile lorsque une fenêtre contextuelle apparaît
Adjust the max size of window ticker at taskbar, helpful for smaller screens=Ajustez la taille maximale du ticker de fenêtre dans la barre des tâches, utile pour les écrans plus petits
Use old menu without graphic icons, flat simple icons only=Utiliser l'ancien menu sans icônes graphiques, des icônes simples et plates uniquement
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=Utilisez des boutons simples pour les éléments de la grille, généralement par défaut si une baisse de fps est détectée, mais vous pouvez toujours la forcer, ce qui améliore les performances.
Enable scroll if tap and drag up or down=Activer le défilement si vous appuyez et faites glisser vers le haut ou vers le bas
Navigate between tabs on swipe left/right=Naviguez entre les onglets en balayant vers la gauche/droite
Show/Hide start menu when you swipe up/down on home grid=Afficher/Masquer le menu Démarrer lorsque vous faites glisser votre doigt vers le haut/bas sur la grille d'accueil
Open text editor in read only mode by default=Ouvrir l'éditeur de texte en mode lecture seule par défaut
Backup copies will be located at ImMobile Data/backups=Les copies de sauvegarde seront situées dans ImMobile Data/sauvegardes
Light palette=Palette de lumière
Default palette=Palette par défaut
Enable keyboard controls.=Activez les commandes du clavier.
Enable blinking cursor (optional as some users consider it to be distracting).=Activer le curseur clignotant (facultatif car certains utilisateurs le considèrent comme gênant).
Pressing Enter will keep item active and select contents (single-line only).=Appuyer sur Entrée gardera l’élément actif et sélectionnera le contenu (une seule ligne uniquement).
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=Activez la transformation des widgets DragXXX en saisie de texte d'un simple clic de souris (sans bouger).
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=Échangez les touches Cmd<>Ctrl, activez divers comportements de style MacOS.
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=Lorsque vous désactivez les lignes d'anticrénelage, vous souhaiterez probablement également désactiver les bordures dans votre style.
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=Multiplicateur alpha supplémentaire pour les éléments désactivés (multiplié par la valeur actuelle de l'Alpha).
Don't mess with UserAgent unless you know what are you doing=Ne plaisantez pas avec UserAgent à moins que vous sachiez ce que vous faites
If disabled, ImMobile will no longer be able to use internet internally, however, unofficial extensions that don't use ImMobile APIs can bypass this=S'il est désactivé, ImMobile ne pourra plus utiliser Internet en interne. Cependant, les extensions non officielles qui n'utilisent pas les API ImMobile peuvent contourner cela.
