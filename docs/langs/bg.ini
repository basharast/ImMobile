Privacy=Поверителност
Introduction=Въведение
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Благодарим ви, че избрахте да използвате ImMobile.Вашата поверителност е важна за мен и аз се ангажирам да гарантирам, че вашият опит с моето приложение остава безопасен и личен.
Information Collection=Събиране на информация
This application is designed with your privacy in mind.=Това приложение е създадено с оглед на вашата поверителност.
I do not collect or gather any personal information from you.=Не събирам и не събирам лична информация от вас.
No data will be stored by the app.=Няма да се съхраняват данни от приложението.
No user tracking or analytics are performed.=Не се извършва проследяване или анализ на потребителите.
Responsibility for Security=Отговорност за сигурността
Third-Party Scripts and Extensions:=Скриптове и разширения на трети страни:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile предлага усъвършенстван API със скриптове или разширения на трети страни.Моля, бъдете внимателни, когато ги инсталирате или използвате, особено ако произхождат от ненадеждни източници.
User's Role in Security:=Роля на потребителя в сигурността:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Като потребител вие носите отговорност за поддържането на безопасността и сигурността на вашето устройство и за гарантиране, че взаимодействате само с надеждно съдържание и услуги.
Potential Risks:=Потенциални рискове:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Инсталирането или използването на скриптове и разширения от ненадеждни източници може да доведе до потенциална повреда или загуба на данни.Потребителите трябва да бъдат бдителни и да оценят надеждността на такива източници, преди да продължат.
Disclaimer=Отказ от отговорност
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Въпреки че се стремя да осигуря сигурна среда, не мога да нося отговорност за проблеми, които възникват от намеса на трети страни или неподходящо боравене с вашето устройство.Отговорността за гарантиране на вашата сигурност е на вас, потребителя.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Използвайки ImMobile, вие потвърждавате и се съгласявате с тази политика за поверителност.Ако имате въпроси или притеснения, можете да се свържете с нас за допълнителна помощ.
This privacy policy is subject to change. Please review it periodically for updates.=Тази политика за поверителност подлежи на промяна.Моля, преглеждайте го периодично за актуализации.
