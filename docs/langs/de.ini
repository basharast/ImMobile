If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=Wenn ImMobile aktiviert ist, berücksichtigt die Reduzierung der FPS in einigen Fenstern nicht mehr, da dies zu einer zusätzlichen Belastung bei umfangreichen Inhalten führen kann
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=Weniger CPU-Auslastung und weniger Wärme können andere Schleifen beeinträchtigen, z. B. wenn Sie über eine Audioemulation oder ähnliches verfügen
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=Benachrichtigung anzeigen, wenn FPS sinkt. Wenn Sie diese Option deaktivieren, wird nur die Benachrichtigung deaktiviert, nicht der FPS-Monitor
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=Diese Option kann die GPU-Nutzung erheblich reduzieren, indem die duplizierten Frames übersprungen werden. Bei Problemen können Sie sie deaktivieren
