It can boost loading time, but some new files may not appear until it get indexed by Windows=Dies kann die Ladezeit verlängern, einige neue Dateien werden jedoch möglicherweise erst angezeigt, wenn sie von Windows indiziert werden
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Die Zieldatei/der Zielordner wird ersetzt, wenn sie bereits vorhanden ist. Seien Sie vorsichtig, wenn Sie diese Funktion deaktivieren, da dies zu vielen Problemen führen kann
On locked systems, it may take more time load folders details, disable it for faster loading=Auf gesperrten Systemen kann das Laden der Ordnerdetails länger dauern. Deaktivieren Sie diese Funktion, um das Laden zu beschleunigen
On locked systems, it may take more time load file details, disable it for faster loading=Auf gesperrten Systemen kann das Laden der Dateidetails länger dauern. Deaktivieren Sie diese Funktion, um das Laden zu beschleunigen
When you have corrupted settings this option can fix that=Wenn Ihre Einstellungen beschädigt sind, kann diese Option das Problem beheben
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Verzögern Sie Speicher-E/A-Anfragen. Auf einem gesperrten System ist die Verzögerung wichtig, aber langsamer. Wenn Sie über Root-Zugriff verfügen, deaktivieren Sie diese Option
Don't enable this if you have build lower than 14393, it will lead to issues=Aktivieren Sie dies nicht, wenn Sie eine niedrigere Build-Version als 14393 haben, da dies zu Problemen führen wird
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Dadurch werden Pakete auf der SD-Karte aufgelöst und repariert, sofern vorhanden, nicht auf der SD-Karte installiert. Dies kann hilfreich sein, wenn Sie große Spiele installieren möchten
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Standardmäßig werden bei der Berechnung der Ordnergröße nur die Stammdateien und nicht die Unterordner berechnet. Die Aktivierung dieser Funktion kann jedoch zu endlosem Laden speziell für das Stammlaufwerk führen
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Dadurch wird versucht, Bilder anhand der optimierten Miniaturansicht in der Vorschau anzuzeigen und zu laden. Andernfalls wird auf die Rohdatei zurückgegriffen
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Dadurch wird versucht, den Windows-Bitmap-Decoder zum Laden des Bildes zu verwenden. Wenn dies fehlschlägt, wird auf STB-Hilfsprogramme zurückgegriffen, die möglicherweise etwas langsamer sind
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Dadurch werden Mips für die geladene Textur generiert. Dies ist hilfreich für eine bessere Qualität, es wird jedoch mehr GPU-Speicher verwendet
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Jedes Bild, das größer als die zulässige Maximalgröße ist, wird komprimiert. Dies kann zu erheblichen Verzögerungen führen, das komprimierte Bild wird jedoch zwischengespeichert
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Jedes Symbol, das größer als die zulässige Maximalgröße ist, wird komprimiert. Dies kann zu großer Verzögerung führen, das komprimierte Symbol wird jedoch zwischengespeichert
This indicate the user already agreed on ImMobile policy=Dies zeigt an, dass der Benutzer der ImMobile-Richtlinie bereits zugestimmt hat
Check for ImMobile updates on startup=Suchen Sie beim Start nach ImMobile-Updates
Enable it only to track issues, otherwise debug log can impact performance=Aktivieren Sie es nur, um Probleme zu verfolgen, andernfalls kann sich das Debug-Protokoll auf die Leistung auswirken
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Dies ist noch umfangreicher als das Debug-Protokoll. Aktivieren Sie es nur bei Bedarf und stellen Sie immer sicher, dass es ausgeschaltet ist, wenn es nicht benötigt wird
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Die Aktivierung wird nicht empfohlen. Verwenden Sie sie nur, wenn Sie Startprobleme haben, die nachverfolgt werden müssen
This wave player with very basic UI for testing only, and may not support all wave types=Dieser Wave-Player mit sehr einfacher Benutzeroberfläche dient nur zum Testen und unterstützt möglicherweise nicht alle Wave-Typen
Show test settings, they can broke the UI, Restart required=Testeinstellungen anzeigen, sie können die Benutzeroberfläche beschädigen, Neustart erforderlich
Auto change background with suggested image to math theme colors=Ändern Sie den Hintergrund automatisch mit dem vorgeschlagenen Bild in die Farben des Mathe-Themas
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Hintergrunddarstellung, „Füllen“ skaliert das Bild im Hinblick auf sein Seitenverhältnis, „Einpassen“ enthält das gesamte Bild auf dem Bildschirm, „Strecken“ füllt und strafft das Bild.
Helpful to choose the color when background set to None.=Es ist hilfreich, die Farbe auszuwählen, wenn der Hintergrund auf „Keine“ eingestellt ist.
Fit=Passt
Stretch=Dehnen
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Bietet eine bessere Leistung, das Fenster wird nur gerendert, wenn der Fokus vorhanden ist, andernfalls wird es als inaktiv angezeigt
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=Für eine stabile Nutzung blenden wir die Tastatur nicht aus, sobald der Fokus verloren geht (es sei denn, Sie haben dies aktiviert). Es gibt ein Schrägstrichsymbol, das normalerweise dabei hilft, die Tastatur auszublenden
Default behavior for touch keyboard when popup appear=Standardverhalten der Touch-Tastatur, wenn ein Popup erscheint
Adjust the max size of window ticker at taskbar, helpful for smaller screens=Passen Sie die maximale Größe des Fenstertickers in der Taskleiste an, was bei kleineren Bildschirmen hilfreich ist
Use old menu without graphic icons, flat simple icons only=Verwenden Sie das alte Menü ohne Grafiksymbole, nur flache, einfache Symbole
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=Verwenden Sie einfache Schaltflächen für Rasterelemente. Dies ist normalerweise die Standardeinstellung, wenn ein FPS-Einbruch erkannt wird. Sie können dies jedoch jederzeit erzwingen, um die Leistung zu verbessern
Enable scroll if tap and drag up or down=Aktivieren Sie das Scrollen, wenn Sie tippen und nach oben oder unten ziehen
Navigate between tabs on swipe left/right=Navigieren Sie zwischen den Registerkarten, indem Sie nach links/rechts wischen
Show/Hide start menu when you swipe up/down on home grid=Startmenü ein-/ausblenden, wenn Sie im Startraster nach oben/unten wischen
Open text editor in read only mode by default=Öffnen Sie den Texteditor standardmäßig im schreibgeschützten Modus
Backup copies will be located at ImMobile Data/backups=Sicherungskopien befinden sich unter ImMobile Data/backups
Light palette=Helle Palette
Default palette=Standardpalette
Enable keyboard controls.=Tastatursteuerung aktivieren.
Enable blinking cursor (optional as some users consider it to be distracting).=Aktivieren Sie den blinkenden Cursor (optional, da einige Benutzer dies als ablenkend empfinden).
Pressing Enter will keep item active and select contents (single-line only).=Durch Drücken der Eingabetaste bleibt das Element aktiv und der Inhalt wird ausgewählt (nur einzeilig).
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=Ermöglichen Sie die Umwandlung von DragXXX-Widgets in Texteingaben mit einem einfachen Mausklick und Loslassen (ohne sie zu verschieben).
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=Tauschen Sie die Cmd<>Strg-Tasten aus und aktivieren Sie verschiedene Verhaltensweisen im MacOS-Stil.
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=Wenn Sie Anti-Aliasing-Linien deaktivieren, möchten Sie wahrscheinlich auch die Ränder in Ihrem Stil deaktivieren.
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=Zusätzlicher Alpha-Multiplikator für deaktivierte Elemente (mit dem aktuellen Wert von Alpha multiplizieren).
Don't mess with UserAgent unless you know what are you doing=Leg dich nicht mit UserAgent an, es sei denn, du weißt, was du tust
