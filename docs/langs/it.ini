When you have corrupted settings this option can fix that=Se hai impostazioni danneggiate, questa opzione può risolverlo
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Ritarda le richieste IO di archiviazione, sul sistema bloccato il ritardo è importante ma più lento, se hai accesso root disabilita questa opzione
Don't enable this if you have build lower than 14393, it will lead to issues=Non abilitarlo se hai una build inferiore a 14393, causerà problemi
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Questo risolverà e correggerà i pacchetti su SDCard, se esistenti, non li installerà su SDCard, può essere utile se desideri installare giochi di grandi dimensioni
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Per impostazione predefinita, la dimensione della cartella Calc calcola solo i file root e non la sottocartella, tuttavia abilitarla può portare a un caricamento infinito specifico per l'unità root
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Questo tenterà di visualizzare in anteprima e caricare le immagini tramite la miniatura ottimizzata, altrimenti tornerà al file raw
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Questo proverà a utilizzare il decodificatore bitmap di Windows per caricare l'immagine, in caso di errore verrà eseguito il fallback sugli helper stb che potrebbero essere un po' più lenti
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Ciò genererà Mips per la texture caricata, è utile per una migliore qualità, ma verrà utilizzata più memoria GPU
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Qualsiasi immagine più grande della dimensione massima consentita verrà compressa, ciò può causare molto ritardo, ma l'immagine compressa verrà memorizzata nella cache
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Qualsiasi icona più grande della dimensione massima consentita verrà compressa, ciò può causare molto ritardo, ma l'icona compressa verrà memorizzata nella cache
This indicate the user already agreed on ImMobile policy=Ciò indica che l'utente ha già accettato la politica ImMobile
