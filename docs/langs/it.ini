Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=Utilizza pulsanti semplici per gli elementi della griglia, di solito questo è predefinito se viene rilevato un calo di fps ma puoi forzarlo sempre, meglio per le prestazioni
Enable scroll if tap and drag up or down=Abilita lo scorrimento toccando e trascinando verso l'alto o verso il basso
