Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Fornirà prestazioni migliori, la finestra verrà renderizzata solo se messa a fuoco altrimenti apparirà come inattiva
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=Per un utilizzo stabile non nascondiamo la tastiera una volta persa la messa a fuoco (a meno che tu non l'abbia abilitata), c'è un'icona a forma di occhio che di solito aiuta a nascondere la tastiera
Default behavior for touch keyboard when popup appear=Comportamento predefinito per la tastiera touch quando viene visualizzato il popup
Adjust the max size of window ticker at taskbar, helpful for smaller screens=Regola la dimensione massima del ticker della finestra sulla barra delle applicazioni, utile per schermi più piccoli
