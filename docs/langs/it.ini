If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=Se verrà utilizzato il servizio di download del sistema operativo disabilitato, httpClient è più lento ma potrebbe risolvere alcuni problemi, abilitalo solo in caso di problemi
