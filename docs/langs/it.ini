Enable it only to track issues, otherwise debug log can impact performance=Abilitalo solo per tenere traccia dei problemi, altrimenti il registro di debug può influire sulle prestazioni
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Questo è ancora più pesante del registro di debug, abilitalo solo su richiesta, assicurati sempre che sia disattivato se non richiesto
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Non è preferibile che sia abilitato, usalo solo se hai problemi di avvio che devono essere monitorati
This wave player with very basic UI for testing only, and may not support all wave types=Questo riproduttore di onde ha un'interfaccia utente molto semplice solo per i test e potrebbe non supportare tutti i tipi di onde
Show test settings, they can broke the UI, Restart required=Mostra le impostazioni di test, possono danneggiare l'interfaccia utente, è necessario il riavvio
Auto change background with suggested image to math theme colors=Cambia automaticamente lo sfondo con l'immagine suggerita nei colori del tema matematico
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Aspetto dello sfondo, Riempi ridimensionerà l'immagine rispetto alle sue proporzioni, Adatta conterrà l'intera immagine all'interno dello schermo, Allunga riempirà e allungherà l'immagine.
Helpful to choose the color when background set to None.=Utile per scegliere il colore quando lo sfondo è impostato su Nessuno.
Fit=Adatta
