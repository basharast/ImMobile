Stretch=खिंचाव
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=बेहतर प्रदर्शन प्रदान करेगा, फोकस करने पर ही विंडो रेंडर होगी अन्यथा यह निष्क्रिय दिखाई देगी
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=स्थिर उपयोग के लिए हम फोकस खो जाने पर कीबोर्ड को छिपाते नहीं हैं (जब तक कि आपने उसे सक्षम नहीं किया है), वहाँ आई स्लैश आइकन है जो आमतौर पर कीबोर्ड को छिपाने में मदद करता है
Default behavior for touch keyboard when popup appear=पॉपअप दिखाई देने पर टच कीबोर्ड के लिए डिफ़ॉल्ट व्यवहार
Adjust the max size of window ticker at taskbar, helpful for smaller screens=टास्कबार पर विंडो टिकर का अधिकतम आकार समायोजित करें, जो छोटी स्क्रीन के लिए उपयोगी है
Use old menu without graphic icons, flat simple icons only=ग्राफ़िक आइकनों के बिना पुराने मेनू का उपयोग करें, केवल सपाट सरल आइकन
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=ग्रिड आइटम के लिए सरल बटन का उपयोग करें, यदि एफपीएस ड्रॉप का पता चलता है तो यह आमतौर पर डिफ़ॉल्ट होता है लेकिन आप इसे हमेशा मजबूर कर सकते हैं, प्रदर्शन के लिए बेहतर है
Enable scroll if tap and drag up or down=यदि टैप करें और ऊपर या नीचे खींचें तो स्क्रॉल सक्षम करें
