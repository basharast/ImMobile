This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=यह लोड किए गए टेक्सचर के लिए Mips उत्पन्न करेगा, यह बेहतर गुणवत्ता के लिए सहायक है, लेकिन अधिक GPU मेमोरी का उपयोग किया जाएगा
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=अनुमत अधिकतम आकार से बड़ी कोई भी छवि संपीड़ित की जाएगी, इससे बहुत देरी हो सकती है, लेकिन संपीड़ित छवि कैश हो जाएगी
