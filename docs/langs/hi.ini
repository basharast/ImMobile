Introduction=परिचय
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=इममोबाइल का उपयोग चुनने के लिए धन्यवाद।आपकी गोपनीयता मेरे लिए महत्वपूर्ण है, और मैं यह सुनिश्चित करने के लिए प्रतिबद्ध हूं कि मेरे ऐप के साथ आपका अनुभव सुरक्षित और निजी बना रहे।
Information Collection=सूचना संग्रहण
This application is designed with your privacy in mind.=यह एप्लिकेशन आपकी गोपनीयता को ध्यान में रखकर डिज़ाइन किया गया है।
I do not collect or gather any personal information from you.=मैं आपसे कोई भी व्यक्तिगत जानकारी एकत्रित या संग्रहित नहीं करता हूँ।
No data will be stored by the app.=ऐप द्वारा कोई डेटा संग्रहीत नहीं किया जाएगा.
No user tracking or analytics are performed.=कोई उपयोगकर्ता ट्रैकिंग या विश्लेषण नहीं किया जाता है।
Responsibility for Security=सुरक्षा की जिम्मेदारी
Third-Party Scripts and Extensions:=तृतीय-पक्ष स्क्रिप्ट और एक्सटेंशन:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile तृतीय-पक्ष स्क्रिप्ट या एक्सटेंशन के साथ उन्नत API प्रदान करता है।कृपया इन्हें स्थापित या उपयोग करते समय सावधानी बरतें, खासकर यदि वे अविश्वसनीय स्रोतों से उत्पन्न हुए हों।
User's Role in Security:=सुरक्षा में उपयोगकर्ता की भूमिका:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=एक उपयोगकर्ता के रूप में, आप अपने डिवाइस की सुरक्षा बनाए रखने और यह सुनिश्चित करने के लिए ज़िम्मेदार हैं कि आप केवल विश्वसनीय सामग्री और सेवाओं के साथ इंटरैक्ट करें।
Potential Risks:=संभावित जोखिम:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=अविश्वसनीय स्रोतों से स्क्रिप्ट और एक्सटेंशन इंस्टॉल करने या उपयोग करने से संभावित क्षति या डेटा हानि हो सकती है।उपयोगकर्ताओं को सतर्क रहना चाहिए और आगे बढ़ने से पहले ऐसे स्रोतों की विश्वसनीयता का आकलन करना चाहिए।
