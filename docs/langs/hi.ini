Show/Hide start menu when you swipe up/down on home grid=जब आप होम ग्रिड पर ऊपर/नीचे स्वाइप करते हैं तो स्टार्ट मेनू दिखाएँ/छिपाएँ
Open text editor in read only mode by default=डिफ़ॉल्ट रूप से टेक्स्ट एडिटर को केवल पढ़ने योग्य मोड में खोलें
