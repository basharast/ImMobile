By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=डिफ़ॉल्ट कैल्क फ़ोल्डर आकार के अनुसार केवल रूट फ़ाइलों की गणना करें, उप फ़ोल्डर की नहीं, हालाँकि इसे सक्षम करने से विशेष रूप से रूट ड्राइव के लिए अंतहीन लोडिंग हो सकती है
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=यह अनुकूलित थंबनेल द्वारा छवियों का पूर्वावलोकन और लोड करने का प्रयास करेगा, अन्यथा यह कच्ची फ़ाइल पर वापस आ जाएगा
