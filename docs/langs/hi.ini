Enable blinking cursor (optional as some users consider it to be distracting).=ब्लिंकिंग कर्सर सक्षम करें (वैकल्पिक क्योंकि कुछ उपयोगकर्ता इसे ध्यान भटकाने वाला मानते हैं)।
Pressing Enter will keep item active and select contents (single-line only).=Enter दबाने से आइटम सक्रिय रहेगा और सामग्री का चयन होगा (केवल एकल-पंक्ति)।
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=एक साधारण माउस क्लिक-रिलीज़ (बिना हिले) के साथ DragXXX विजेट्स को टेक्स्ट इनपुट में बदलना सक्षम करें।
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=Cmd<>Ctrl कुंजियाँ स्वैप करें, विभिन्न MacOS शैली व्यवहार सक्षम करें।
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=एंटी-अलियासिंग लाइनों को अक्षम करते समय, आप संभवतः अपनी शैली में सीमाओं को भी अक्षम करना चाहेंगे।
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=बनावट डेटा का उपयोग करके तेज़ लाइनें।बिलिनियर फ़िल्टरिंग (बिंदु/निकटतम फ़िल्टरिंग नहीं) के साथ रेंडर करने के लिए बैकएंड की आवश्यकता है।
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=अक्षम वस्तुओं के लिए अतिरिक्त अल्फ़ा गुणक (अल्फ़ा के वर्तमान मान से गुणा करें)।
Don't mess with UserAgent unless you know what are you doing=जब तक आप नहीं जानते कि आप क्या कर रहे हैं, तब तक UserAgent के साथ खिलवाड़ न करें
If disabled, ImMobile will no longer be able to use internet internally, however, unofficial extensions that don't use ImMobile APIs can bypass this=यदि अक्षम किया जाता है, तो ImMobile अब आंतरिक रूप से इंटरनेट का उपयोग नहीं कर पाएगा, हालाँकि, अनौपचारिक एक्सटेंशन जो ImMobile API का उपयोग नहीं करते हैं, वे इसे बायपास कर सकते हैं
If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=यदि अक्षम ओएस डाउनलोड सेवा का उपयोग किया जाएगा, तो httpClient धीमा है लेकिन कुछ समस्याओं का समाधान कर सकता है, इसे केवल तभी सक्षम करें जब आपको कोई समस्या हो
Don't mess with API unless you know what are you doing=जब तक आप नहीं जानते कि आप क्या कर रहे हैं, एपीआई के साथ खिलवाड़ न करें
Log everything to individual files per instance (PELogs\{instance}\). Disable to improve performance.=हर चीज़ को प्रति उदाहरण अलग-अलग फ़ाइलों में लॉग करें (PELogs\{instance}\)।प्रदर्शन में सुधार करने के लिए अक्षम करें.
Instance create/stop/cleanup events=उदाहरण बनाएं/रोकें/क्लीनअप इवेंट
General info messages (disables 'device busy' spam)=सामान्य जानकारी संदेश ('डिवाइस व्यस्त' स्पैम को अक्षम करता है)
