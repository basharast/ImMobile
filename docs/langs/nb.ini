It can boost loading time, but some new files may not appear until it get indexed by Windows=Det kan øke lastetiden, men noen nye filer vises kanskje ikke før de blir indeksert av Windows
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Målfil/mappe vil bli erstattet hvis den allerede eksisterer, vær forsiktig hvis du slår av dette kan føre til mange problemer
On locked systems, it may take more time load folders details, disable it for faster loading=På låste systemer kan det ta lengre tid å laste mappedetaljer, deaktiver det for raskere lasting
