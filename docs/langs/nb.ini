Privacy=Personvern
Introduction=Introduksjon
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Takk for at du valgte å bruke ImMobile.Personvernet ditt er viktig for meg, og jeg er forpliktet til å sikre at opplevelsen din med appen min forblir trygg og privat.
Information Collection=Informasjonsinnsamling
This application is designed with your privacy in mind.=Denne applikasjonen er designet med tanke på personvernet ditt.
I do not collect or gather any personal information from you.=Jeg samler ikke inn eller samler inn noen personlig informasjon fra deg.
No data will be stored by the app.=Ingen data vil bli lagret av appen.
No user tracking or analytics are performed.=Ingen brukersporing eller analyser utføres.
Responsibility for Security=Ansvar for sikkerhet
Third-Party Scripts and Extensions:=Tredjeparts skript og utvidelser:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile tilbyr avansert API med tredjeparts skript eller utvidelser.Vær forsiktig når du installerer eller bruker disse, spesielt hvis de kommer fra upålitelige kilder.
User's Role in Security:=Brukerens rolle i sikkerhet:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Som bruker er du ansvarlig for å opprettholde sikkerheten og sikkerheten til enheten din og sørge for at du kun samhandler med pålitelig innhold og tjenester.
Potential Risks:=Potensielle risikoer:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Installering eller bruk av skript og utvidelser fra ikke-klarerte kilder kan føre til potensiell skade eller tap av data.Brukere bør være på vakt og vurdere påliteligheten til slike kilder før de fortsetter.
Disclaimer=Ansvarsfraskrivelse
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Selv om jeg streber etter å tilby et sikkert miljø, kan jeg ikke holdes ansvarlig for eventuelle problemer som oppstår fra tredjepartsinterferens eller upassende håndtering av enheten din.Ansvaret for å ivareta din sikkerhet ligger hos deg som bruker.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Ved å bruke ImMobile erkjenner og godtar du denne personvernerklæringen.Hvis du har spørsmål eller bekymringer, ta gjerne kontakt for ytterligere hjelp.
This privacy policy is subject to change. Please review it periodically for updates.=Denne personvernerklæringen kan endres.Se den med jevne mellomrom for oppdateringer.
