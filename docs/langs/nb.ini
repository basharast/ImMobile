When you have corrupted settings this option can fix that=Når du har ødelagte innstillinger kan dette alternativet fikse det
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Delay Storage IO-forespørsler, på låst system er forsinkelsen viktig, men langsommere, hvis du har root-tilgang, deaktiver dette alternativet
Don't enable this if you have build lower than 14393, it will lead to issues=Ikke aktiver dette hvis du har bygget lavere enn 14393, det vil føre til problemer
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Dette vil løse og fikse pakker på SDCard hvis det finnes, ikke installere på SDCard, det kan være nyttig hvis du vil installere store spill
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Som standard beregner mappestørrelsen bare rotfilene, ikke undermappen, men å aktivere dette kan føre til uendelig lasting spesifikt for rotstasjonen
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Dette vil prøve å forhåndsvise og laste inn bilder ved hjelp av det optimaliserte miniatyrbildet, ellers faller det tilbake til råfil
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Dette vil prøve å bruke Windows bitmap-dekoder for å laste inn bildet, hvis feil vil falle tilbake til stb-hjelpere som kan være litt tregere
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Dette vil generere Mips for den lastede teksturen, det er nyttig for bedre kvalitet, men mer GPU-minne vil bli brukt
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Ethvert bilde som er større enn den tillatte maksimale størrelsen vil bli komprimert, dette kan føre til mye forsinkelse, men det komprimerte bildet vil bli bufret
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Ethvert ikon som er større enn den tillatte maksimale størrelsen vil bli komprimert, dette kan føre til mye forsinkelse, men det komprimerte ikonet vil bli bufret
This indicate the user already agreed on ImMobile policy=Dette indikerer at brukeren allerede har godtatt ImMobile-policyen
Check for ImMobile updates on startup=Se etter ImMobile-oppdateringer ved oppstart
Enable it only to track issues, otherwise debug log can impact performance=Aktiver den bare for å spore problemer, ellers kan feilsøkingsloggen påvirke ytelsen
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Denne enda tungere enn feilsøkingsloggen, aktiver den kun på forespørsel, sørg alltid for at den er av hvis ikke nødvendig
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Ikke foretrukket å være aktivert, bruk den bare hvis du har oppstartsproblemer som må spores
This wave player with very basic UI for testing only, and may not support all wave types=Denne bølgespilleren med svært grunnleggende brukergrensesnitt kun for testing, og støtter kanskje ikke alle bølgetyper
Show test settings, they can broke the UI, Restart required=Vis testinnstillinger, de kan bryte brukergrensesnittet, omstart kreves
Auto change background with suggested image to math theme colors=Endre bakgrunn automatisk med foreslått bilde til matematiske temafarger
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Bakgrunnsutseende, Fill vil skalere bildet med hensyn til dets sideforhold, Fit vil inneholde hele bildet inne på skjermen, Stretch vil fylle og stive bildet.
Helpful to choose the color when background set to None.=Nyttig å velge farge når bakgrunnen er satt til Ingen.
