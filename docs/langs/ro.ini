If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=Dacă este activat, ImMobile nu mai ia în considerare reducerea FPS pe unele ferestre, poate duce la o încărcare suplimentară cu conținut greu
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=Mai puțină încărcare a procesorului și mai puțină căldură, poate afecta alte bucle, cum ar fi dacă aveți emulare audio sau ceva de genul
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=Afișați notificarea când FPS scade, dezactivarea acesteia va dezactiva doar notificarea, nu monitorul FPS
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=Această opțiune poate reduce foarte mult utilizarea GPU-ului, omitând cadrele duplicate, dezactivând-o în caz de probleme
Choose folder=Alegeți folderul
Choose=Alege
Choose folder..=Alege folderul..
It can boost loading time, but some new files may not appear until it get indexed by Windows=Poate crește timpul de încărcare, dar este posibil ca unele fișiere noi să nu apară până când nu sunt indexate de Windows
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Fișierul/dosarul țintă va fi înlocuit dacă există deja, aveți grijă să dezactivați acest lucru poate duce la o mulțime de probleme
On locked systems, it may take more time load folders details, disable it for faster loading=Pe sistemele blocate, poate dura mai mult timp încărcarea detaliilor folderelor, dezactivați-l pentru o încărcare mai rapidă
On locked systems, it may take more time load file details, disable it for faster loading=Pe sistemele blocate, poate dura mai mult timp încărcarea detaliilor fișierului, dezactivați-l pentru o încărcare mai rapidă
When you have corrupted settings this option can fix that=Când aveți setări corupte, această opțiune poate rezolva asta
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Delay Storage IO requests, pe sistemul blocat întârzierea este importantă, dar mai lentă, dacă aveți acces root dezactivați această opțiune
Don't enable this if you have build lower than 14393, it will lead to issues=Nu activați acest lucru dacă aveți o versiune mai mică de 14393, aceasta va duce la probleme
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Acest lucru va rezolva și va repara pachetele de pe SDCard dacă există, nu se va instala pe SDCard, poate fi util dacă doriți să instalați jocuri mari
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=În mod implicit, dimensiunea folderului calc calculează numai fișierele rădăcină, nu sub folderul, totuși activarea acestui lucru poate duce la încărcare nesfârșită special pentru unitatea rădăcină
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Aceasta va încerca să previzualizeze și să încarce imagini după miniatura optimizată, altfel se va reveni la fișierul brut
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Acest lucru va încerca să folosească decodorul bitmap Windows pentru a încărca imaginea, dacă eșuează, se va recurge la ajutoarele stb, care poate fi puțin mai lent
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Acest lucru va genera Mips pentru textura încărcată, este util pentru o calitate mai bună, dar va fi folosită mai multă memorie GPU
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Orice imagine mai mare decât dimensiunea maximă permisă va fi comprimată, acest lucru poate duce la multă întârziere, dar imaginea comprimată va fi stocată în cache.
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Orice pictogramă mai mare decât dimensiunea maximă permisă va fi comprimată, acest lucru poate duce la multă întârziere, dar pictograma comprimată va fi stocată în cache
This indicate the user already agreed on ImMobile policy=Acest lucru indică faptul că utilizatorul a fost deja de acord cu politica ImMobile
Check for ImMobile updates on startup=Verificați actualizările ImMobile la pornire
Enable it only to track issues, otherwise debug log can impact performance=Activați-l numai pentru a urmări problemele, altfel jurnalul de depanare poate afecta performanța
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Acest jurnal și mai greu decât jurnalul de depanare, activați-l numai la cerere, asigurați-vă întotdeauna că este oprit dacă nu este necesar
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Nu preferați să fie activat, utilizați-l numai dacă aveți probleme de pornire care trebuie urmărite
This wave player with very basic UI for testing only, and may not support all wave types=Acest wave player cu o interfață de utilizare foarte simplă numai pentru testare și este posibil să nu accepte toate tipurile de wave
Show test settings, they can broke the UI, Restart required=Afișați setările de testare, acestea pot întrerupe interfața de utilizare, este necesară repornirea
Auto change background with suggested image to math theme colors=Schimbați automat fundalul cu imaginea sugerată în culorile temei matematice
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Aspect de fundal, Fill va scala imaginea în raport cu raportul de aspect al acesteia, Fit va conține întreaga imagine în interiorul ecranului, Stretch va umple și întinde imaginea.
Helpful to choose the color when background set to None.=Este util să alegeți culoarea când fundalul este setat la Niciunul.
Fit=Fit
Stretch=Întindere
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=Va oferi performanțe mai bune, fereastra va fi redată numai dacă se concentrează, altfel va apărea ca inactivă
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=Pentru o utilizare stabilă, nu ascundem tastatura odată pierdută focalizarea (cu excepția cazului în care ați activat aceasta), există pictograma oblică ochi care de obicei ajută la ascunderea tastaturii
Default behavior for touch keyboard when popup appear=Comportament implicit pentru tastatura tactilă atunci când apare o fereastră pop-up
Adjust the max size of window ticker at taskbar, helpful for smaller screens=Ajustați dimensiunea maximă a simbolului ferestrei din bara de activități, util pentru ecrane mai mici
Use old menu without graphic icons, flat simple icons only=Utilizați meniul vechi fără pictograme grafice, doar pictograme simple plate
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=Folosiți butoane simple pentru elementele din grilă, de obicei implicit dacă este detectată o scădere a fps, dar o puteți forța întotdeauna, mai bine pentru performanță
Enable scroll if tap and drag up or down=Activați derularea dacă atingeți și trageți în sus sau în jos
