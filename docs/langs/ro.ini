Pressing Enter will keep item active and select contents (single-line only).=Apăsarea Enter va menține elementul activ și va selecta conținutul (doar pe o singură linie).
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=Activați transformarea widget-urilor DragXXX în introducere de text cu un simplu clic-eliberare a mouse-ului (fără mișcare).
