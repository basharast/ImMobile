Privacy=Confidențialitate
Introduction=Introducere
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Vă mulțumim că ați ales să utilizați ImMobile.Confidențialitatea ta este importantă pentru mine și mă angajez să mă asigur că experiența ta cu aplicația mea rămâne sigură și privată.
Information Collection=Colectarea informațiilor
This application is designed with your privacy in mind.=Această aplicație este concepută având în vedere confidențialitatea dvs.
I do not collect or gather any personal information from you.=Nu colectez și nu adun informații personale de la dvs.
No data will be stored by the app.=Nicio dată nu va fi stocată de aplicație.
No user tracking or analytics are performed.=Nu se efectuează urmărirea sau analizele utilizatorilor.
Responsibility for Security=Responsabilitatea pentru securitate
Third-Party Scripts and Extensions:=Scripturi și extensii terță parte:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile oferă API avansate cu scripturi sau extensii terță parte.Vă rugăm să fiți atenți când instalați sau utilizați acestea, mai ales dacă provin din surse nesigure.
User's Role in Security:=Rolul utilizatorului în securitate:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=În calitate de utilizator, sunteți responsabil pentru menținerea siguranței și securității dispozitivului dvs. și pentru a vă asigura că interacționați numai cu conținut și servicii de încredere.
Potential Risks:=Riscuri potențiale:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Instalarea sau utilizarea de scripturi și extensii din surse nesigure poate duce la potențiale daune sau pierderi de date.Utilizatorii ar trebui să fie vigilenți și să evalueze fiabilitatea acestor surse înainte de a continua.
Disclaimer=Disclaimer
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Deși mă străduiesc să ofer un mediu securizat, nu pot fi făcut responsabil pentru problemele care apar din interferența terților sau manipularea necorespunzătoare a dispozitivului dvs.Responsabilitatea pentru asigurarea securității dvs. revine dvs., utilizatorul.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Prin utilizarea ImMobile, luați la cunoștință și sunteți de acord cu această politică de confidențialitate.Dacă aveți întrebări sau nelămuriri, nu ezitați să contactați pentru asistență suplimentară.
This privacy policy is subject to change. Please review it periodically for updates.=Această politică de confidențialitate poate fi schimbată.Vă rugăm să îl revizuiți periodic pentru actualizări.
