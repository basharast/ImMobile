Introduction=บทนำ
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=ขอขอบคุณที่เลือกใช้ ImMobileความเป็นส่วนตัวของคุณเป็นสิ่งสำคัญสำหรับฉัน และฉันมุ่งมั่นที่จะทำให้ประสบการณ์ของคุณกับแอปของฉันยังคงปลอดภัยและเป็นส่วนตัว
Information Collection=การรวบรวมข้อมูล
This application is designed with your privacy in mind.=แอปพลิเคชันนี้ได้รับการออกแบบโดยคำนึงถึงความเป็นส่วนตัวของคุณ
I do not collect or gather any personal information from you.=ฉันไม่รวบรวมหรือรวบรวมข้อมูลส่วนบุคคลใด ๆ จากคุณ
No data will be stored by the app.=แอปจะไม่มีการจัดเก็บข้อมูล
No user tracking or analytics are performed.=ไม่มีการติดตามหรือวิเคราะห์ผู้ใช้
Responsibility for Security=ความรับผิดชอบต่อความปลอดภัย
Third-Party Scripts and Extensions:=สคริปต์และส่วนขยายของบุคคลที่สาม:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile เสนอ API ขั้นสูงพร้อมสคริปต์หรือส่วนขยายของบุคคลที่สามโปรดใช้ความระมัดระวังเมื่อติดตั้งหรือใช้งานสิ่งเหล่านี้ โดยเฉพาะอย่างยิ่งหากมาจากแหล่งที่ไม่น่าเชื่อถือ
User's Role in Security:=บทบาทของผู้ใช้ในการรักษาความปลอดภัย:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=ในฐานะผู้ใช้ คุณมีหน้าที่รับผิดชอบในการรักษาความปลอดภัยและความปลอดภัยของอุปกรณ์ของคุณ และรับรองว่าคุณจะโต้ตอบกับเนื้อหาและบริการที่เชื่อถือได้เท่านั้น
Potential Risks:=ความเสี่ยงที่อาจเกิดขึ้น:
