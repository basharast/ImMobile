Introduction=вступ
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Дякуємо, що вибрали ImMobile.Ваша конфіденційність важлива для мене, і я дбаю про те, щоб ваша робота з моїм додатком залишалася безпечною та конфіденційною.
Information Collection=Збірка інформації
This application is designed with your privacy in mind.=Ця програма розроблена з урахуванням вашої конфіденційності.
I do not collect or gather any personal information from you.=Я не збираю та не збираю будь-яку особисту інформацію від вас.
No data will be stored by the app.=Програма не зберігатиме дані.
No user tracking or analytics are performed.=Відстеження та аналітика користувачів не виконуються.
Responsibility for Security=Відповідальність за безпеку
Third-Party Scripts and Extensions:=Скрипти та розширення сторонніх розробників:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile пропонує розширений API зі сторонніми скриптами або розширеннями.Будьте обережні, встановлюючи або використовуючи їх, особливо якщо вони походять із ненадійних джерел.
User's Role in Security:=Роль користувача в безпеці:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Як користувач, ви несете відповідальність за безпеку свого пристрою та за те, що ви взаємодієте лише з надійним вмістом і службами.
Potential Risks:=Потенційні ризики:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Встановлення або використання сценаріїв і розширень із ненадійних джерел може призвести до потенційної шкоди або втрати даних.Користувачі повинні бути пильними та оцінити надійність таких джерел, перш ніж продовжити.
Disclaimer=Відмова від відповідальності
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Хоча я прагну забезпечити безпечне середовище, я не можу нести відповідальність за будь-які проблеми, які виникають через втручання третіх сторін або неналежне поводження з вашим пристроєм.Відповідальність за забезпечення вашої безпеки лежить на вас, користувачеві.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Використовуючи ImMobile, ви визнаєте та погоджуєтеся з цією політикою конфіденційності.Якщо у вас виникнуть будь-які запитання чи занепокоєння, зверніться за додатковою допомогою.
This privacy policy is subject to change. Please review it periodically for updates.=Ця політика конфіденційності може бути змінена.Будь ласка, періодично переглядайте його для оновлень.
