Privacy=Gizlilik
Introduction=Giriş
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=ImMobile'ı kullanmayı seçtiğiniz için teşekkür ederiz.Gizliliğiniz benim için önemlidir ve uygulamamla olan deneyiminizin güvenli ve özel kalmasını sağlamaya kararlıyım.
Information Collection=Bilgi Toplama
This application is designed with your privacy in mind.=Bu uygulama gizliliğiniz göz önünde bulundurularak tasarlanmıştır.
I do not collect or gather any personal information from you.=Sizden herhangi bir kişisel bilgi toplamıyor veya topluyorum.
No data will be stored by the app.=Uygulama tarafından hiçbir veri saklanmayacaktır.
No user tracking or analytics are performed.=Hiçbir kullanıcı takibi veya analizi yapılmaz.
Responsibility for Security=Güvenlik Sorumluluğu
Third-Party Scripts and Extensions:=Üçüncü Taraf Komut Dosyaları ve Uzantıları:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile, üçüncü taraf komut dosyaları veya uzantılarıyla gelişmiş API sunar.Bunları yüklerken veya kullanırken, özellikle de güvenilmeyen kaynaklardan geliyorlarsa lütfen dikkatli olun.
User's Role in Security:=Kullanıcının Güvenlikteki Rolü:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Bir kullanıcı olarak cihazınızın güvenliğini ve emniyetini korumak ve yalnızca güvenilir içerik ve hizmetlerle etkileşimde bulunmanızı sağlamak sizin sorumluluğunuzdadır.
Potential Risks:=Potansiyel Riskler:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Güvenilmeyen kaynaklardan gelen komut dosyalarının ve uzantıların yüklenmesi veya kullanılması olası hasara veya veri kaybına yol açabilir.Kullanıcılar dikkatli olmalı ve devam etmeden önce bu tür kaynakların güvenilirliğini değerlendirmelidir.
Disclaimer=Sorumluluk reddi beyanı
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Güvenli bir ortam sağlamaya çalışsam da, üçüncü tarafların müdahalesinden veya cihazınızın uygunsuz şekilde kullanılmasından kaynaklanan sorunlardan sorumlu tutulamam.Güvenliğinizin sağlanmasının sorumluluğu siz kullanıcıya aittir.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=ImMobile'ı kullanarak bu gizlilik politikasını onaylıyor ve kabul ediyorsunuz.Herhangi bir sorunuz veya endişeniz varsa daha fazla yardım için bizimle iletişime geçmekten çekinmeyin.
This privacy policy is subject to change. Please review it periodically for updates.=Bu gizlilik politikası değişebilir.Güncellemeler için lütfen periyodik olarak inceleyin.
