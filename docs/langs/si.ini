Introduction=හැඳින්වීම
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=ImMobile භාවිතා කිරීමට තෝරා ගැනීම ගැන ඔබට ස්තුතියි.ඔබේ පෞද්ගලිකත්වය මට වැදගත් වන අතර, මගේ යෙදුම සමඟ ඔබේ අත්දැකීම සුරක්ෂිතව සහ පෞද්ගලිකව පවතින බව සහතික කිරීමට මම කැපවී සිටිමි.
Information Collection=තොරතුරු එකතුව
This application is designed with your privacy in mind.=මෙම යෙදුම ඔබගේ පෞද්ගලිකත්වය මනසේ තබාගෙන නිර්මාණය කර ඇත.
I do not collect or gather any personal information from you.=මම ඔබෙන් කිසිම පුද්ගලික තොරතුරක් රැස් කරන්නේ හෝ රැස් කරන්නේ නැහැ.
No data will be stored by the app.=යෙදුම මඟින් දත්ත ගබඩා නොකෙරේ.
No user tracking or analytics are performed.=පරිශීලක ලුහුබැඳීම් හෝ විශ්ලේෂණ සිදු නොකෙරේ.
Responsibility for Security=ආරක්ෂාව සඳහා වගකීම
Third-Party Scripts and Extensions:=තෙවන පාර්ශවීය ස්ක්‍රිප්ට් සහ දිගු:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile තෙවන පාර්ශවීය ස්ක්‍රිප්ට් හෝ දිගු සමඟ උසස් API පිරිනමයි.මේවා ස්ථාපනය කිරීමේදී හෝ භාවිතා කිරීමේදී ප්‍රවේශම් වන්න, විශේෂයෙන්ම ඒවා විශ්වාස නොකළ මූලාශ්‍රවලින් බිහිවන්නේ නම්.
User's Role in Security:=ආරක්ෂාව සඳහා පරිශීලක භූමිකාව:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=පරිශීලකයෙකු ලෙස, ඔබේ උපාංගයේ ආරක්ෂාව සහ ආරක්ෂාව පවත්වා ගැනීම සහ ඔබ විශ්වාසදායක අන්තර්ගතයන් සහ සේවාවන් සමඟ පමණක් අන්තර් ක්‍රියා කරන බව සහතික කිරීම සඳහා ඔබ වගකිව යුතුය.
Potential Risks:=විය හැකි අවදානම්:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=විශ්වාස නොකළ මූලාශ්‍රවලින් ස්ක්‍රිප්ට් සහ දිගු ස්ථාපනය කිරීම හෝ භාවිතා කිරීම විභව හානියට හෝ දත්ත නැතිවීමට හේතු විය හැක.පරිශීලකයන් විමසිලිමත් විය යුතු අතර ඉදිරියට යාමට පෙර එවැනි මූලාශ්‍රවල විශ්වසනීයත්වය තක්සේරු කළ යුතුය.
