Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=FPS පහත වැටෙන විට දැනුම්දීම පෙන්වන්න, මෙය අක්‍රිය කිරීමෙන් FPS මොනිටරය නොව දැනුම්දීම අක්‍රිය කරයි
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=මෙම විකල්පය අනුපිටපත් රාමු මඟ හැරීමෙන් GPU භාවිතය බෙහෙවින් අඩු කළ හැකිය, ගැටළු ඇති විට එය අක්‍රිය කරන්න
Choose folder=ෆෝල්ඩරය තෝරන්න
Choose=තෝරන්න
Choose folder..=ෆෝල්ඩරය තෝරන්න..
It can boost loading time, but some new files may not appear until it get indexed by Windows=එය පැටවීමේ කාලය වැඩි කළ හැක, නමුත් සමහර නව ගොනු වින්ඩෝස් විසින් සුචිගත කරන තෙක් නොපෙන්වයි
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=ඉලක්ක ගොනුව/ෆෝල්ඩරය එය දැනටමත් පවතී නම් ප්‍රතිස්ථාපනය වනු ඇත, ප්‍රවේශම් වන්න මෙය ක්‍රියා විරහිත කිරීම ගැටලු රැසකට හේතු විය හැක
On locked systems, it may take more time load folders details, disable it for faster loading=අගුලු දැමූ පද්ධතිවල, ෆෝල්ඩර විස්තර පැටවීමට වැඩි කාලයක් ගත විය හැක, වේගවත් පූරණය සඳහා එය අක්‍රිය කරන්න
On locked systems, it may take more time load file details, disable it for faster loading=අගුලු දැමූ පද්ධතිවල, ගොනු විස්තර පැටවීමට වැඩි කාලයක් ගත විය හැක, වේගවත් පූරණය සඳහා එය අක්‍රිය කරන්න
When you have corrupted settings this option can fix that=ඔබට දූෂිත සැකසුම් ඇති විට මෙම විකල්පයට එය නිවැරදි කළ හැක
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=ප්‍රමාද ගබඩා IO ඉල්ලීම්, අගුලු දැමූ පද්ධතිය මත ප්‍රමාදය වැදගත් නමුත් මන්දගාමී වේ, ඔබට root ප්‍රවේශය තිබේ නම් මෙම විකල්පය අක්‍රීය කරන්න
Don't enable this if you have build lower than 14393, it will lead to issues=ඔබ 14393 ට වඩා අඩු ගොඩනගා ඇත්නම් මෙය සක්‍රීය නොකරන්න, එය ගැටළු වලට තුඩු දෙනු ඇත
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=මෙය SDCard මත පැකේජ තිබේ නම් විසඳා නිවැරදි කරයි, SDCard මත ස්ථාපනය නොකරයි, ඔබට විශාල ක්‍රීඩා ස්ථාපනය කිරීමට අවශ්‍ය නම් එය ප්‍රයෝජනවත් විය හැක.
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=පෙරනිමියෙන් calc ෆෝල්ඩර ප්‍රමාණය උප ෆෝල්ඩරය නොව root ගොනු පමණක් ගණනය කරන්න, කෙසේ වෙතත් මෙය සක්‍රීය කිරීම root drive සඳහා විශේෂයෙන් නිමක් නැති පූරණය වීමට හේතු විය හැක.
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=මෙය ප්‍රශස්ත කළ සිඟිති රුව මඟින් රූප පෙරදසුන් කිරීමට සහ පූරණය කිරීමට උත්සාහ කරනු ඇත, එසේ නොමැතිනම් එය අමු ගොනුව වෙත ආපසු යනු ඇත.
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=මෙය රූපය පූරණය කිරීමට Windows bitmap විකේතකය භාවිතා කිරීමට උත්සාහ කරනු ඇත, අසාර්ථක වුවහොත් එය ටිකක් මන්දගාමී විය හැකි stb උපකාරක වෙත ආපසු යනු ඇත.
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=මෙය පටවන ලද වයනය සඳහා Mips ජනනය කරනු ඇත, එය වඩා හොඳ ගුණාත්මක භාවය සඳහා උපකාරී වේ, නමුත් වැඩි GPU මතකයක් භාවිතා කරනු ඇත
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=අවසර ලත් උපරිම ප්‍රමාණයට වඩා විශාල ඕනෑම රූපයක් සම්පීඩිත වනු ඇත, මෙය බොහෝ ප්‍රමාදයකට තුඩු දිය හැක, නමුත් සම්පීඩිත රූපය හැඹිලිගත වනු ඇත
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=අවසර ලත් උපරිම ප්‍රමාණයට වඩා විශාල ඕනෑම නිරූපකයක් සම්පීඩිත වේ, මෙය බොහෝ ප්‍රමාදයකට හේතු විය හැක, නමුත් සම්පීඩිත නිරූපකය හැඹිලිගත වනු ඇත
This indicate the user already agreed on ImMobile policy=පරිශීලකයා දැනටමත් ImMobile ප්‍රතිපත්තියට එකඟ වී ඇති බව මෙයින් ඇඟවේ
Check for ImMobile updates on startup=ආරම්භයේදී ImMobile යාවත්කාලීන සඳහා පරීක්ෂා කරන්න
Enable it only to track issues, otherwise debug log can impact performance=ගැටළු හඹා යාමට පමණක් එය සබල කරන්න, එසේ නොමැතිනම් නිදොස් ලොගය කාර්ය සාධනයට බලපෑ හැකිය
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=මෙය දෝශ නිරාකරණ ලොගයට වඩා බරයි, ඉල්ලුම මත පමණක් සක්‍රීය කරන්න, අවශ්‍ය නැතිනම් එය ක්‍රියා විරහිත බව සහතික කරන්න
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=සබල කිරීමට කැමති නැත, ඔබට නිරීක්ෂණය කළ යුතු ආරම්භක ගැටලුවක් ඇත්නම් පමණක් එය භාවිතා කරන්න
This wave player with very basic UI for testing only, and may not support all wave types=පරීක්ෂණ සඳහා පමණක් ඉතා මූලික UI සහිත මෙම තරංග වාදකය, සහ සියලු තරංග වර්ග සඳහා සහය නොදක්වයි
Show test settings, they can broke the UI, Restart required=පරීක්ෂණ සැකසුම් පෙන්වන්න, ඔවුන්ට UI බිඳ දැමිය හැක, නැවත ආරම්භ කිරීම අවශ්‍ය වේ
Auto change background with suggested image to math theme colors=ගණිත තේමා වර්ණවලට යෝජිත රූපය සමඟ පසුබිම ස්වයංක්‍රීයව වෙනස් කරන්න
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=පසුබිම් පෙනුම, පුරවන්න රූපයේ දර්ශන අනුපාතයට සාපේක්ෂව පරිමාණය කරයි, Fit තිරය තුළ සම්පූර්ණ රූපය අඩංගු වේ, Stretch විසින් රූපය පුරවා දිගු කරයි.
Helpful to choose the color when background set to None.=පසුබිම කිසිවක් නැත ලෙස සකසා ඇති විට වර්ණය තෝරා ගැනීමට උපකාරී වේ.
Fit=සුදුසුයි
Stretch=දිගු කරන්න
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=වඩා හොඳ කාර්ය සාධනයක් ලබා දෙනු ඇත, කවුළුව විදැහුම් කරනු ලබන්නේ නාභිගත කළහොත් පමණි, එසේ නොමැතිනම් එය අක්‍රිය ලෙස දිස් වනු ඇත
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=ස්ථාවර භාවිතය සඳහා, අවධානය නැති වූ පසු අපි යතුරුපුවරුව සඟවන්නේ නැත (ඔබ එය සක්‍රීය කර ඇත්නම් මිස), සාමාන්‍යයෙන් යතුරුපුවරුව සැඟවීමට උපකාරී වන අයි ස්ලෑෂ් නිරූපකය ඇත.
Default behavior for touch keyboard when popup appear=උත්පතන දිස්වන විට ස්පර්ශ යතුරු පුවරුව සඳහා පෙරනිමි හැසිරීම
Adjust the max size of window ticker at taskbar, helpful for smaller screens=කුඩා තිර සඳහා ප්‍රයෝජනවත් වන කාර්ය තීරුවේ කවුළු ටිකර් හි උපරිම ප්‍රමාණය සීරුමාරු කරන්න
Use old menu without graphic icons, flat simple icons only=ග්‍රැෆික් අයිකන නොමැතිව පැරණි මෙනුව භාවිතා කරන්න, පැතලි සරල අයිකන පමණි
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=ජාල අයිතම සඳහා සරල බොත්තම් භාවිතා කරන්න, fps වැටීම අනාවරණය වුවහොත් මෙය සාමාන්‍යයෙන් පෙරනිමිය නමුත් ඔබට එය සැමවිටම බල කළ හැක, කාර්ය සාධනය සඳහා වඩා හොඳය
Enable scroll if tap and drag up or down=තට්ටු කර ඉහළට හෝ පහළට අදින්න නම් අනුචලනය සබල කරන්න
Navigate between tabs on swipe left/right=වමට/දකුණට ස්වයිප් කිරීමේදී ටැබ් අතර සංචාලනය කරන්න
Show/Hide start menu when you swipe up/down on home grid=ඔබ මුල් පිටුව ජාලකයේ ඉහළට/පහළට ස්වයිප් කරන විට ආරම්භක මෙනුව පෙන්වන්න/සඟවන්න
Open text editor in read only mode by default=පෙරනිමියෙන් කියවීමට පමණක් ප්‍රකාරයේදී පෙළ සංස්කාරකය විවෘත කරන්න
Backup copies will be located at ImMobile Data/backups=උපස්ථ පිටපත් ImMobile Data/backups හි පිහිටයි
Light palette=සැහැල්ලු තලය
Default palette=පෙරනිමි පුවරුව
Enable keyboard controls.=යතුරුපුවරු පාලන සබල කරන්න.
Enable blinking cursor (optional as some users consider it to be distracting).=දැල්වෙන කර්සරය සබල කරන්න (සමහර පරිශීලකයින් එය අවධානය වෙනතකට යොමු කරන ලෙස සලකන බැවින් විකල්ප).
Pressing Enter will keep item active and select contents (single-line only).=Enter එබීමෙන් අයිතමය සක්‍රියව තබා ගන්නා අතර අන්තර්ගතය තෝරන්න (තනි පේළියක් පමණි).
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=සරල මූසික ක්ලික් කිරීමකින් (චලනය නොවී) DragXXX විජට් පෙළ ආදානයක් බවට පත් කිරීම සබල කරන්න.
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=Cmd<>Ctrl යතුරු මාරු කරන්න, විවිධ MacOS මෝස්තර හැසිරීම් සබල කරන්න.
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=ප්‍රති-අන්වර්ථකරණ රේඛා අක්‍රිය කරන විට, ඔබට බොහෝ විට ඔබේ ශෛලිය තුළද මායිම් අක්‍රිය කිරීමට අවශ්‍ය වනු ඇත.
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=වයනය දත්ත භාවිතයෙන් වේගවත් රේඛා.ද්වි රේඛීය පෙරීම (ලක්ෂ්‍යය/ළඟම පෙරහන නොවේ) සමඟින් විදැහුම් කිරීමට පසුපෙළ අවශ්‍ය වේ.
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=ආබාධිත අයිතම සඳහා අතිරේක ඇල්ෆා ගුණකය (ඇල්ෆා වත්මන් අගයට වඩා ගුණ කරන්න).
Don't mess with UserAgent unless you know what are you doing=ඔබ කරන්නේ කුමක්දැයි ඔබ දන්නේ නම් මිස UserAgent සමඟ පටලවා නොගන්න
If disabled, ImMobile will no longer be able to use internet internally, however, unofficial extensions that don't use ImMobile APIs can bypass this=අබල කළහොත්, ImMobile හට තවදුරටත් අභ්‍යන්තරව අන්තර්ජාලය භාවිත කිරීමට නොහැකි වනු ඇත, කෙසේ වෙතත්, ImMobile API භාවිත නොකරන නිල නොවන දිගුවලට මෙය මඟ හැරිය හැක.
If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=අබල කළ OS බාගැනීම් සේවාව භාවිතා කරන්නේ නම්, httpClient මන්දගාමී නමුත් සමහර ගැටළු විසඳිය හැක, ඔබට ගැටලුවක් ඇත්නම් පමණක් එය සබල කරන්න
Don't mess with API unless you know what are you doing=ඔබ කරන්නේ කුමක්දැයි ඔබ දන්නේ නම් මිස API සමඟ පටලවා නොගන්න
Log everything to individual files per instance (PELogs\{instance}\). Disable to improve performance.=එක් එක් එක් එක් ගොනු වලට සියල්ල ලොග් කරන්න (PELogs\{instance}\).කාර්ය සාධනය වැඩි දියුණු කිරීමට අබල කරන්න.
Instance create/stop/cleanup events=සිදුවීම් නිර්මාණය/නැවැත්වීම/පිරිසිදු කිරීම
General info messages (disables 'device busy' spam)=සාමාන්‍ය තොරතුරු පණිවිඩ ('උපාංග කාර්යබහුල' අයාචිත තැපැල් අබල කරයි)
Trace every API call (EXTREMELY verbose)=සෑම API ඇමතුමක්ම සොයා ගන්න (අතිශයින්ම වාචික)
BETA!, not working correctly=BETA!, නිවැරදිව ක්‍රියා නොකරයි
Zoom and Scroll can be faster if value increased or slower if value reduced, Delay 1 and 2 responsible for the detection speed between two points incase of zoom, increase them to reduce the amount of zoom based on two points distance change=විශාලනය සහ අනුචලනය අගය වැඩි වුවහොත් හෝ අගය අඩු වුවහොත් මන්දගාමී වුවහොත් වේගවත් විය හැක, විශාලනය කිරීමේදී ලකුණු දෙකක් අතර හඳුනාගැනීමේ වේගය සඳහා ප්‍රමාද 1 සහ 2 වගකිව යුතුය, ලකුණු දෙකක දුර වෙනස්වීම මත පදනම්ව විශාලන ප්‍රමාණය අඩු කිරීමට ඒවා වැඩි කරන්න.
Scroll Speed:=අනුචලන වේගය:
Release Delay:=මුදා හැරීමේ ප්‍රමාදය:
Font Options=අකුරු විකල්ප
Font Glyph=අකුරු Glyph
Size (May appear scaled)=ප්‍රමාණය (පරිමාණ ලෙස දිස්විය හැක)
Merge in default font=පෙරනිමි අකුරු තුළ ඒකාබද්ධ කරන්න
Disable=අක්රිය කරන්න
Do you want to delete this font?=ඔබට මෙම අකුරු මකා දැමීමට අවශ්‍යද?
Restart ImMobile required!=ImMobile නැවත ආරම්භ කිරීම අවශ්‍යයි!
Please set Glyph settings for the new fonts=කරුණාකර නව අකුරු සඳහා Glyph සැකසුම් සකසන්න
