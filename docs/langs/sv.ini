Privacy=Sekretess
Introduction=Introduktion
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Tack för att du väljer att använda ImMobile.Din integritet är viktig för mig, och jag är fast besluten att se till att din upplevelse av min app förblir säker och privat.
Information Collection=Informationsinsamling
This application is designed with your privacy in mind.=Denna applikation är designad med din integritet i åtanke.
I do not collect or gather any personal information from you.=Jag samlar inte in eller samlar in någon personlig information från dig.
No data will be stored by the app.=Ingen data kommer att lagras av appen.
No user tracking or analytics are performed.=Ingen användarspårning eller analys utförs.
Responsibility for Security=Ansvar för säkerhet
Third-Party Scripts and Extensions:=Skript och tillägg från tredje part:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile erbjuder avancerad API med tredjepartsskript eller tillägg.Var försiktig när du installerar eller använder dessa, särskilt om de kommer från otillförlitliga källor.
User's Role in Security:=Användarens roll i säkerhet:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Som användare är du ansvarig för att upprätthålla säkerheten och säkerheten för din enhet och se till att du endast interagerar med pålitligt innehåll och tjänster.
Potential Risks:=Potentiella risker:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Att installera eller använda skript och tillägg från otillförlitliga källor kan leda till potentiell skada eller dataförlust.Användare bör vara vaksamma och bedöma tillförlitligheten hos sådana källor innan de fortsätter.
Disclaimer=Ansvarsfriskrivning
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Även om jag strävar efter att tillhandahålla en säker miljö, kan jag inte hållas ansvarig för några problem som uppstår från tredje parts interferens eller olämplig hantering av din enhet.Ansvaret för att säkerställa din säkerhet ligger hos dig, användaren.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Genom att använda ImMobile godkänner och godkänner du denna integritetspolicy.Om du har några frågor eller funderingar är du välkommen att kontakta oss för ytterligare hjälp.
This privacy policy is subject to change. Please review it periodically for updates.=Denna integritetspolicy kan komma att ändras.Se den regelbundet för uppdateringar.
