Don't use Microsoft base render, Restart required=Microsoft 기본 렌더링을 사용하지 마세요. 다시 시작해야 합니다.
If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=활성화된 경우 ImMobile은 더 이상 일부 창에서 FPS 감소를 고려하지 않으며 콘텐츠가 많을 때 추가 로드가 발생할 수 있습니다.
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=CPU 로드가 적고 발열이 적으므로 오디오 에뮬레이션 등이 있는 경우 다른 루프에 영향을 미칠 수 있습니다.
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=FPS가 떨어질 때 알림 표시. 이 기능을 비활성화하면 FPS 모니터가 아닌 알림만 비활성화됩니다.
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=이 옵션은 중복된 프레임을 건너뛰고 문제가 있는 경우 꺼서 GPU 사용량을 크게 줄일 수 있습니다.
Choose folder=폴더 선택
Choose=선택
Choose folder..=폴더를 선택하세요..
It can boost loading time, but some new files may not appear until it get indexed by Windows=로딩 시간을 늘릴 수 있지만 일부 새 파일은 Windows에서 색인을 생성할 때까지 표시되지 않을 수 있습니다.
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=대상 파일/폴더가 이미 존재하는 경우 교체됩니다. 이 기능을 끄면 많은 문제가 발생할 수 있으므로 주의하세요.
On locked systems, it may take more time load folders details, disable it for faster loading=잠긴 시스템에서는 폴더 세부 정보를 로드하는 데 더 많은 시간이 걸릴 수 있습니다. 더 빠른 로드를 위해 비활성화하세요.
On locked systems, it may take more time load file details, disable it for faster loading=잠긴 시스템에서는 파일 세부 정보를 로드하는 데 더 많은 시간이 걸릴 수 있습니다. 더 빠른 로드를 위해 비활성화하세요.
When you have corrupted settings this option can fix that=설정이 손상된 경우 이 옵션으로 문제를 해결할 수 있습니다.
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=스토리지 IO 요청 지연, 잠긴 시스템에서는 지연이 중요하지만 속도가 느립니다. 루트 액세스 권한이 있는 경우 이 옵션을 비활성화합니다.
Don't enable this if you have build lower than 14393, it will lead to issues=14393보다 낮은 빌드를 사용하는 경우 이 기능을 활성화하지 마세요. 문제가 발생할 수 있습니다.
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=SDCard에 설치하는 것이 아니라 SDCard에 있는 패키지를 해결하고 수정합니다. 대규모 게임을 설치하려는 경우 도움이 될 수 있습니다.
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=기본적으로 calc 폴더 크기는 하위 폴더가 아닌 루트 파일만 계산합니다. 그러나 이를 활성화하면 루트 드라이브에 대해 무한 로딩이 발생할 수 있습니다.
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=이렇게 하면 최적화된 썸네일로 이미지를 미리 보고 로드하려고 시도하며, 그렇지 않으면 원시 파일로 대체됩니다.
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Windows 비트맵 디코더를 사용하여 이미지를 로드하려고 합니다. 실패할 경우 stb 도우미로 대체되어 약간 느려질 수 있습니다.
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=이렇게 하면 로드된 텍스처에 대한 Mips가 생성되며 품질 향상에 도움이 되지만 더 많은 GPU 메모리가 사용됩니다.
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=허용되는 최대 크기보다 큰 이미지는 압축됩니다. 이로 인해 많은 지연이 발생할 수 있지만 압축된 이미지는 캐시됩니다.
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=허용되는 최대 크기보다 큰 아이콘은 압축되므로 많은 지연이 발생할 수 있지만 압축된 아이콘은 캐시됩니다.
This indicate the user already agreed on ImMobile policy=이는 사용자가 이미 ImMobile 정책에 동의했음을 나타냅니다.
Check for ImMobile updates on startup=시작 시 ImMobile 업데이트 확인
Enable it only to track issues, otherwise debug log can impact performance=문제를 추적할 때만 활성화하세요. 그렇지 않으면 디버그 로그가 성능에 영향을 줄 수 있습니다.
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=이는 디버그 로그보다 훨씬 무겁기 때문에 필요할 때만 활성화하고 필요하지 않으면 항상 꺼져 있는지 확인하세요.
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=활성화하는 것은 바람직하지 않습니다. 추적해야 하는 시작 문제가 있는 경우에만 사용하십시오.
This wave player with very basic UI for testing only, and may not support all wave types=이 웨이브 플레이어는 테스트용으로만 매우 기본적인 UI를 갖추고 있으며 모든 웨이브 유형을 지원하지 않을 수도 있습니다.
Show test settings, they can broke the UI, Restart required=테스트 설정 표시, UI가 손상될 수 있음, 다시 시작 필요
Auto change background with suggested image to math theme colors=추천 이미지가 포함된 배경을 수학 테마 색상으로 자동 변경
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=배경 모양, 채우기는 화면 비율에 따라 이미지 크기를 조정하고, 맞춤은 화면 내부에 전체 이미지를 포함하고, 늘이기는 이미지를 채우고 확장합니다.
Helpful to choose the color when background set to None.=배경이 없음으로 설정된 경우 색상을 선택하는 데 도움이 됩니다.
Fit=핏
Stretch=스트레칭
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=더 나은 성능을 제공합니다. 창은 포커스가 있는 경우에만 렌더링되며, 그렇지 않으면 비활성으로 표시됩니다.
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=안정적인 사용을 위해 초점을 잃으면 키보드를 숨기지 않습니다(활성화하지 않는 한). 일반적으로 키보드를 숨기는 데 도움이 되는 눈 슬래시 아이콘이 있습니다.
Default behavior for touch keyboard when popup appear=팝업이 나타날 때 터치 키보드의 기본 동작
Adjust the max size of window ticker at taskbar, helpful for smaller screens=작업 표시줄에서 창 티커의 최대 크기를 조정하여 작은 화면에 유용합니다.
Use old menu without graphic icons, flat simple icons only=그래픽 아이콘 없이 이전 메뉴 사용, 평면 단순 아이콘만 사용
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=그리드 항목에는 간단한 버튼을 사용합니다. 이는 일반적으로 fps 저하가 감지된 경우 기본값이지만 성능을 위해 항상 강제로 설정할 수 있습니다.
Enable scroll if tap and drag up or down=탭하고 위 또는 아래로 드래그하면 스크롤을 활성화합니다.
Navigate between tabs on swipe left/right=왼쪽/오른쪽으로 스와이프하여 탭 간 이동
Show/Hide start menu when you swipe up/down on home grid=홈 그리드에서 위/아래로 스와이프하면 시작 메뉴 표시/숨기기
Open text editor in read only mode by default=기본적으로 읽기 전용 모드로 텍스트 편집기 열기
Backup copies will be located at ImMobile Data/backups=백업 복사본은 ImMobile Data/backups에 있습니다.
