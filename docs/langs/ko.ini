Introduction=소개
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=ImMobile을 선택해 주셔서 감사합니다.귀하의 개인 정보 보호는 저에게 중요하며 귀하의 앱 사용 경험이 안전하고 비공개로 유지되도록 최선을 다하고 있습니다.
Information Collection=정보수집
This application is designed with your privacy in mind.=이 응용 프로그램은 귀하의 개인 정보 보호를 염두에 두고 설계되었습니다.
I do not collect or gather any personal information from you.=나는 귀하로부터 어떠한 개인 정보도 수집하거나 수집하지 않습니다.
No data will be stored by the app.=앱에는 데이터가 저장되지 않습니다.
No user tracking or analytics are performed.=사용자 추적이나 분석은 수행되지 않습니다.
Responsibility for Security=보안에 대한 책임
Third-Party Scripts and Extensions:=타사 스크립트 및 확장:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile은 타사 스크립트 또는 확장 기능을 갖춘 고급 API를 제공합니다.특히 신뢰할 수 없는 소스에서 가져온 경우 설치하거나 사용할 때 주의하십시오.
User's Role in Security:=보안에서 사용자의 역할:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=사용자로서 귀하는 장치의 안전과 보안을 유지하고 신뢰할 수 있는 콘텐츠 및 서비스와만 상호 작용하도록 할 책임이 있습니다.
Potential Risks:=잠재적 위험:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=신뢰할 수 없는 소스의 스크립트 및 확장 프로그램을 설치하거나 사용하면 잠재적인 손상이나 데이터 손실이 발생할 수 있습니다.사용자는 계속 진행하기 전에 경계하고 해당 소스의 신뢰성을 평가해야 합니다.
Disclaimer=면책조항
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=저는 안전한 환경을 제공하기 위해 노력하지만, 제3자의 간섭이나 기기의 부적절한 취급으로 인해 발생하는 모든 문제에 대해 책임을 질 수 없습니다.귀하의 보안을 보장할 책임은 사용자인 귀하에게 있습니다.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=ImMobile을 사용함으로써 귀하는 본 개인정보 보호정책을 인정하고 동의하게 됩니다.질문이나 우려 사항이 있는 경우 언제든지 문의하여 추가 지원을 받으세요.
This privacy policy is subject to change. Please review it periodically for updates.=본 개인정보 보호정책은 변경될 수 있습니다.업데이트를 위해 정기적으로 검토하시기 바랍니다.
