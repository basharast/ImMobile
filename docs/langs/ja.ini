Zoom and Scroll can be faster if value increased or slower if value reduced, Delay 1 and 2 responsible for the detection speed between two points incase of zoom, increase them to reduce the amount of zoom based on two points distance change=値を増やすとズームとスクロールが速くなり、値を減らすと遅くなります。遅延 1 と 2 はズームの場合の 2 点間の検出速度に影響し、値を大きくすると 2 点の距離の変化に基づいてズーム量が減少します。
