Privacy=プライバシー
Introduction=はじめに
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=ImMobile をご利用いただきありがとうございます。私にとってあなたのプライバシーは重要であり、私のアプリでのあなたのエクスペリエンスが安全かつプライバシーに保たれるよう全力で取り組んでいます。
Information Collection=情報収集
This application is designed with your privacy in mind.=このアプリケーションはプライバシーを考慮して設計されています。
I do not collect or gather any personal information from you.=あなたから個人情報を収集したり収集したりすることはありません。
No data will be stored by the app.=アプリによってデータは保存されません。
No user tracking or analytics are performed.=ユーザーの追跡や分析は実行されません。
Responsibility for Security=セキュリティに対する責任
Third-Party Scripts and Extensions:=サードパーティのスクリプトと拡張機能:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile は、サードパーティのスクリプトまたは拡張機能を使用した高度な API を提供します。これらをインストールまたは使用するときは、特に信頼できないソースからのものである場合には注意してください。
User's Role in Security:=セキュリティにおけるユーザーの役割:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=ユーザーには、デバイスの安全性とセキュリティを維持し、信頼できるコンテンツとサービスのみを操作するようにする責任があります。
Potential Risks:=潜在的なリスク:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=信頼できないソースからのスクリプトや拡張機能をインストールまたは使用すると、損傷やデータ損失が発生する可能性があります。ユーザーは続行する前に警戒し、そのような情報源の信頼性を評価する必要があります。
Disclaimer=免責事項
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=安全な環境を提供するよう努めますが、第三者による干渉やデバイスの不適切な取り扱いによって発生した問題については責任を負いません。セキュリティを確保する責任はユーザーであるあなたにあります。
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=ImMobile を使用すると、このプライバシー ポリシーを承認し、同意したものとみなされます。ご質問やご不明な点がございましたら、お気軽にお問い合わせください。
This privacy policy is subject to change. Please review it periodically for updates.=このプライバシーポリシーは変更される場合があります。最新情報を定期的に確認してください。
