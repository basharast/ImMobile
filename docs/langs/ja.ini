It can boost loading time, but some new files may not appear until it get indexed by Windows=読み込み時間を短縮できますが、一部の新しいファイルは Windows によってインデックスが作成されるまで表示されない場合があります。
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=ターゲットのファイル/フォルダーが既に存在する場合は置き換えられます。これをオフにすると多くの問題が発生する可能性があるので注意してください
On locked systems, it may take more time load folders details, disable it for faster loading=ロックされたシステムでは、フォルダーの詳細を読み込むのに時間がかかる場合があります。読み込みを速くするには無効にしてください
On locked systems, it may take more time load file details, disable it for faster loading=ロックされたシステムでは、ファイルの詳細のロードに時間がかかる場合があります。ロードを高速化するには無効にしてください
When you have corrupted settings this option can fix that=設定が破損している場合、このオプションでそれを修正できます
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=ストレージ IO リクエストを遅延します。ロックされたシステムでは遅延は重要ですが、遅くなります。root アクセス権がある場合は、このオプションを無効にしてください。
Don't enable this if you have build lower than 14393, it will lead to issues=14393 より前のビルドを使用している場合は、これを有効にしないでください。問題が発生する可能性があります。
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=これは、SDCard にインストールするのではなく、SDCard 上のパッケージが存在する場合は解決して修正します。大規模なゲームをインストールする場合に役立ちます。
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=デフォルトでは、フォルダー サイズの計算はサブフォルダーではなくルート ファイルのみを計算しますが、これを有効にすると、特にルート ドライブに対して無限の読み込みが発生する可能性があります。
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=これにより、最適化されたサムネイルによる画像のプレビューとロードが試行されます。そうでない場合は、生のファイルにフォールバックされます。
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=これは、Windows ビットマップ デコーダを使用して画像をロードしようとしますが、失敗した場合は stb ヘルパーにフォールバックするため、少し遅くなる可能性があります。
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=これにより、ロードされたテクスチャのミップが生成され、品質が向上しますが、より多くの GPU メモリが使用されます。
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=許可された最大サイズを超える画像は圧縮され、大幅な遅延が発生する可能性がありますが、圧縮された画像はキャッシュされます。
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=許可された最大サイズより大きいアイコンは圧縮され、大幅な遅延が発生する可能性がありますが、圧縮されたアイコンはキャッシュされます。
This indicate the user already agreed on ImMobile policy=これは、ユーザーがすでに ImMobile ポリシーに同意していることを示します
Check for ImMobile updates on startup=起動時に ImMobile のアップデートを確認する
Enable it only to track issues, otherwise debug log can impact performance=問題を追跡する場合にのみ有効にします。有効にしないと、デバッグ ログがパフォーマンスに影響を与える可能性があります。
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=これはデバッグ ログよりもさらに重いため、オンデマンドでのみ有効にし、必要がない場合は常にオフにしてください。
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=有効にすることは望ましくありません。追跡する必要がある起動時の問題がある場合にのみ使用してください。
This wave player with very basic UI for testing only, and may not support all wave types=この Wave プレーヤーはテスト用の非常に基本的な UI を備えており、すべての Wave タイプをサポートしているわけではありません。
Show test settings, they can broke the UI, Restart required=テスト設定を表示します。UI が壊れる可能性があります。再起動が必要です
Auto change background with suggested image to math theme colors=推奨された画像の背景を数学テーマの色に自動変更します
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=背景の外観、Fill はアスペクト比に従って画像を拡大縮小します、Fit は画像全体を画面内に含めます、Stretch は画像を塗りつぶしてつなぎ合わせます。
Helpful to choose the color when background set to None.=背景を「なし」に設定した場合に色を選択すると便利です。
Fit=フィット
Stretch=ストレッチ
Will provide better performance, window will get rendered only if focus otherwise it will appear as inactive=パフォーマンスが向上します。ウィンドウはフォーカスされている場合にのみレンダリングされ、フォーカスされていない場合は非アクティブとして表示されます。
For stable usage we don't hide keyboard once focus lost (unless you enabled that), there eye slash icon that usually help to hide keyboard=安定した使用のため、フォーカスが失われた場合はキーボードを非表示にしません (それを有効にしない限り)。通常はキーボードを隠すのに役立つ目のスラッシュ アイコンがあります。
Default behavior for touch keyboard when popup appear=ポップアップが表示されたときのタッチ キーボードのデフォルトの動作
Adjust the max size of window ticker at taskbar, helpful for smaller screens=タスクバーのウィンドウティッカーの最大サイズを調整します。画面が小さい場合に便利です。
Use old menu without graphic icons, flat simple icons only=グラフィックアイコンのない古いメニューを使用し、フラットなシンプルなアイコンのみを使用します
Use simple buttons for grid items, this usually default if fps drop detected but you can force it always, better for performance=グリッド項目にはシンプルなボタンを使用します。通常、これは fps の低下が検出された場合のデフォルトですが、常に強制することもでき、パフォーマンスが向上します。
Enable scroll if tap and drag up or down=タップして上下にドラッグするとスクロールが有効になります
Navigate between tabs on swipe left/right=左/右にスワイプしてタブ間を移動します
Show/Hide start menu when you swipe up/down on home grid=ホームグリッドを上下にスワイプしたときにスタートメニューを表示/非表示にする
Open text editor in read only mode by default=デフォルトでは読み取り専用モードでテキストエディタを開きます
Backup copies will be located at ImMobile Data/backups=バックアップ コピーは ImMobile Data/backups にあります。
Light palette=ライトパレット
Default palette=デフォルトのパレット
Enable keyboard controls.=キーボードコントロールを有効にします。
Enable blinking cursor (optional as some users consider it to be distracting).=カーソルの点滅を有効にします (一部のユーザーは気が散ると考えているため、オプションです)。
Pressing Enter will keep item active and select contents (single-line only).=Enter キーを押すと項目がアクティブなままになり、内容が選択されます (単一行のみ)。
Enable turning DragXXX widgets into text input with a simple mouse click-release (without moving).=(移動せずに) マウスをクリックして放すだけで、DragXXX ウィジェットをテキスト入力に変換できるようにします。
Swap Cmd<>Ctrl keys, enable various MacOS style behaviors.=Cmd<>Ctrl キーを入れ替えて、さまざまな MacOS スタイルの動作を有効にします。
When disabling anti-aliasing lines, you'll probably want to disable borders in your style as well.=ラインのアンチエイリアスを無効にするときは、スタイルの境界線も無効にする必要があるでしょう。
Faster lines using texture data. Require backend to render with bilinear filtering (not point/nearest filtering).=テクスチャデータを使用したより高速なライン。バックエンドには双線形フィルタリング (点/最近接フィルタリングではない) を使用してレンダリングする必要があります。
Additional alpha multiplier for disabled items (multiply over current value of Alpha).=無効な項目に対する追加のアルファ乗数 (アルファの現在の値に乗算します)。
Don't mess with UserAgent unless you know what are you doing=何をしているのかわからない限り、UserAgent をいじらないでください
If disabled, ImMobile will no longer be able to use internet internally, however, unofficial extensions that don't use ImMobile APIs can bypass this=無効にすると、ImMobile は内部でインターネットを使用できなくなりますが、ImMobile API を使用しない非公式拡張機能はこれを回避できます。
If disabled OS download service will be used, httpClient slower but may solve some issues, enable it only if you have problem=無効にした場合、OS ダウンロード サービスが使用され、httpClient は遅くなりますが、いくつかの問題を解決できる可能性があります。問題がある場合にのみ有効にしてください。
Don't mess with API unless you know what are you doing=何をしているのかわからない限り、API をいじらないでください
Log everything to individual files per instance (PELogs\{instance}\). Disable to improve performance.=すべてをインスタンスごとに個別のファイルに記録します (PELogs\{instance}\)。パフォーマンスを向上させるには無効にします。
Instance create/stop/cleanup events=インスタンスの作成/停止/クリーンアップ イベント
General info messages (disables 'device busy' spam)=一般情報メッセージ (「デバイスが使用中」スパムを無効にする)
Trace every API call (EXTREMELY verbose)=すべての API 呼び出しをトレースします (非常に詳細)
