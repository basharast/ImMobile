If enabled ImMobile no longer consider reducing FPS on some windows, may lead to extra load with heavy content=Jos käytössä, ImMobile ei enää harkitse FPS:n vähentämistä joissakin ikkunoissa, se voi johtaa raskaan sisällön ylimääräiseen kuormitukseen
Less CPU load and less heat, may impace other loops like if you have audio emulation or something like that=Vähemmän suorittimen kuormitusta ja vähemmän lämpöä, voi vaikuttaa muihin silmukoihin, kuten jos sinulla on ääniemulointi tai jotain vastaavaa
Show notification when FPS drop, disabling this will only disable the notification not FPS monitor=Näytä ilmoitus, kun FPS putoaa. Tämän poistaminen käytöstä poistaa käytöstä vain ilmoituksen, ei FPS-näyttöä
This option can reduce GPU usage very much by skipping the duplicated frames, turn it off incase of issues=Tämä vaihtoehto voi vähentää grafiikkasuorittimen käyttöä huomattavasti ohittamalla päällekkäiset kehykset ja sammuttamalla sen, jos ongelmia ilmenee
Choose folder=Valitse kansio
