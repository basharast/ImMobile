Privacy=Yksityisyys
Introduction=Johdanto
Thank you for choosing to use ImMobile. Your privacy is important to me, and I'm committed to ensuring that your experience with my app remains safe and private.=Kiitos, että valitsit ImMobile-palvelun.Yksityisyytesi on minulle tärkeää, ja olen sitoutunut varmistamaan, että kokemuksesi sovelluksestani pysyy turvassa ja yksityisenä.
Information Collection=Tietojen kerääminen
This application is designed with your privacy in mind.=Tämä sovellus on suunniteltu yksityisyyttäsi ajatellen.
I do not collect or gather any personal information from you.=En kerää tai kerää sinulta mitään henkilökohtaisia ​​tietoja.
No data will be stored by the app.=Sovellus ei tallenna tietoja.
No user tracking or analytics are performed.=Käyttäjien seurantaa tai analytiikkaa ei suoriteta.
Responsibility for Security=Vastuu turvallisuudesta
Third-Party Scripts and Extensions:=Kolmannen osapuolen skriptit ja laajennukset:
ImMobile offer advanced API with third-party scripts or extensions. Please be caution when installing or using these, especially if they originate from untrusted sources.=ImMobile tarjoaa edistyneen sovellusliittymän kolmannen osapuolen komentosarjoilla tai laajennuksilla.Ole varovainen, kun asennat tai käytät näitä, varsinkin jos ne ovat peräisin epäluotettavista lähteistä.
User's Role in Security:=Käyttäjän rooli suojauksessa:
As a user, you are responsible for maintaining the safety and security of your device and ensuring that you only interact with trusted content and services.=Käyttäjänä olet vastuussa laitteesi turvallisuuden ylläpitämisestä ja sen varmistamisesta, että olet vuorovaikutuksessa vain luotetun sisällön ja palveluiden kanssa.
Potential Risks:=Mahdolliset riskit:
Installing or using scripts and extensions from untrusted sources can lead to potential damage or data loss. Users should be vigilant and assess the trustworthiness of such sources before proceeding.=Epäluotettavista lähteistä peräisin olevien komentosarjojen ja laajennusten asentaminen tai käyttäminen voi johtaa mahdollisiin vaurioihin tai tietojen menettämiseen.Käyttäjien tulee olla valppaita ja arvioida tällaisten lähteiden luotettavuus ennen jatkamista.
Disclaimer=Vastuuvapauslauseke
While I strive to provide a secure environment, I cannot be held responsible for any issues that arise from third-party interference or the inappropriate handling of your device. The responsibility for ensuring your security lies with you, the user.=Vaikka pyrin tarjoamaan turvallisen ympäristön, en voi olla vastuussa mistään ongelmista, jotka johtuvat kolmannen osapuolen häiriöistä tai laitteesi sopimattomasta käsittelystä.Vastuu turvallisuutesi varmistamisesta on sinulla, käyttäjällä.
By using ImMobile, you acknowledge and agree to this privacy policy. If you have any questions or concerns, feel free to reach out for further assistance.=Käyttämällä ImMobilea hyväksyt tämän tietosuojakäytännön.Jos sinulla on kysyttävää tai huolenaiheita, ota rohkeasti yhteyttä saadaksesi lisäapua.
This privacy policy is subject to change. Please review it periodically for updates.=Tämä tietosuojakäytäntö voi muuttua.Tarkista se säännöllisesti päivitysten varalta.
