It can boost loading time, but some new files may not appear until it get indexed by Windows=Se voi pidentää latausaikaa, mutta jotkin uudet tiedostot eivät välttämättä ilmesty ennen kuin Windows indeksoi ne
Target file/folder will be replaced if it was already exists, be careful turning this off may lead to a lot of issues=Kohdetiedosto/kansio korvataan, jos se oli jo olemassa. Ole varovainen tämän poistaminen käytöstä voi aiheuttaa monia ongelmia
On locked systems, it may take more time load folders details, disable it for faster loading=Lukituissa järjestelmissä kansioiden tietojen lataaminen voi kestää kauemmin. Poista se käytöstä nopeuttaaksesi latausta
On locked systems, it may take more time load file details, disable it for faster loading=Lukituissa järjestelmissä tiedostotietojen lataaminen voi kestää kauemmin. Poista se käytöstä nopeuttaaksesi latausta
When you have corrupted settings this option can fix that=Jos asetukset ovat vioittuneet, tämä vaihtoehto voi korjata sen
Delay Storage IO requests, on locked system the delay is important but slower, if you have root access disable this option=Viive Storage IO -pyynnöt, lukitussa järjestelmässä viive on tärkeä mutta hitaampi, jos sinulla on pääkäyttäjän oikeudet, poista tämä vaihtoehto
Don't enable this if you have build lower than 14393, it will lead to issues=Älä ota tätä käyttöön, jos koontiversiosi on pienempi kuin 14393, se johtaa ongelmiin
This will resolve and fix packages on SDCard if exists, not install on SDCard, it can be helpful if you want to install large games=Tämä ratkaisee ja korjaa paketit SDCardissa, jos niitä on, ei asenna SDCardiin, se voi olla hyödyllistä, jos haluat asentaa suuria pelejä
By default calc folder size only compute the root files not sub folder, however enabling this can lead to endless loading specificly for root drive=Oletusarvoisesti calc-kansion koko laskee vain juuritiedostot, ei alikansiota, mutta tämän ottaminen käyttöön voi johtaa loputtomaan lataukseen juuri asemalle
This will attempt to preview and load images by the optimized thumbnail, otherwise it will fallback to raw file=Tämä yrittää esikatsella ja ladata kuvia optimoidun pikkukuvan mukaan, muuten se palaa raakatiedostoon
This will try to use Windows bitmap decoder to load image, if fail will fallback to stb helpers which may a bit slower=Tämä yrittää käyttää Windowsin bittikarttadekooderia kuvan lataamiseen, jos epäonnistuu, palaa jne-apuohjelmiin, jotka voivat olla hieman hitaampia
This will generate Mips for the loaded texture, it's helpful for better quality, but more GPU memory will be used=Tämä luo Mips-arvoja ladatulle tekstuurille, se auttaa parantamaan laatua, mutta enemmän GPU-muistia käytetään
Any image larger than the allowed max size will be compressed, this can lead to much delay, but the compressed image will be cached=Mikä tahansa kuva, joka on suurempi kuin sallittu enimmäiskoko, pakataan, mikä voi aiheuttaa paljon viivettä, mutta pakattu kuva tallennetaan välimuistiin
Any icon larger than the allowed max size will be compressed, this can lead to much delay, but the compressed icon will be cached=Kaikki sallittua enimmäiskokoa suuremmat kuvakkeet pakataan, mikä voi aiheuttaa paljon viivettä, mutta pakattu kuvake tallennetaan välimuistiin
This indicate the user already agreed on ImMobile policy=Tämä osoittaa, että käyttäjä on jo sopinut ImMobile-käytännöstä
Check for ImMobile updates on startup=Tarkista ImMobile-päivitykset käynnistyksen yhteydessä
Enable it only to track issues, otherwise debug log can impact performance=Ota se käyttöön vain ongelmien seuraamiseksi, muuten virheenkorjausloki voi vaikuttaa suorituskykyyn
This even more heavy than debug log, enable it on demand only, always ensure it's off if not required=Tämä vielä raskaampi kuin virheenkorjausloki, ota se käyttöön vain pyynnöstä, varmista aina, että se on pois päältä, jos sitä ei tarvita
Not preferred to be enabled, only use it if you have startup issue that need to be tracked=Ei ole suositeltavaa ottaa käyttöön, käytä sitä vain, jos sinulla on käynnistysongelma, jota on seurattava
This wave player with very basic UI for testing only, and may not support all wave types=Tämä wave-soitin, jossa on erittäin yksinkertainen käyttöliittymä vain testaukseen, eikä se välttämättä tue kaikkia wave-tyyppejä
Show test settings, they can broke the UI, Restart required=Näytä testiasetukset, ne voivat rikkoa käyttöliittymän, uudelleenkäynnistys vaaditaan
Auto change background with suggested image to math theme colors=Vaihda automaattisesti taustaa ehdotetuilla kuvilla matemaattisten teemavärien mukaan
Background appearance, Fill will scale the image with respect to it's aspect ratio, Fit will contain the whole image inside the screen, Stretch will fill and stertch the image.=Taustan ulkonäkö, Fill skaalaa kuvan suhteessa sen kuvasuhteeseen, Fit sisältää koko kuvan ruudun sisällä, Stretch täyttää ja strtch kuvan.
Helpful to choose the color when background set to None.=Hyödyllinen värin valinnassa, kun taustaksi on asetettu Ei mitään.
Fit=Sopiva
